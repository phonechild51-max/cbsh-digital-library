<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Admin — Activity Logs</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/datatables.net-bs5@2.2.2/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>Activity Logs</span>
          <button class="btn btn-sm btn-danger" onclick="clearOldLogs()"><i class="bi bi-trash me-1"></i>Clear Old</button>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover" id="logsTable" style="width:100%;">
              <thead>
                <tr>
                  <th>Time</th>
                  <th>User</th>
                  <th>Role</th>
                  <th>Action</th>
                  <th>Details</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="logsBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net@2.2.2/js/dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net-bs5@2.2.2/js/dataTables.bootstrap5.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    if (!AuthGuard.init('admin')) throw new Error('Not authorized');
    App.initLayout('Activity Logs', 'admin');

    (async function loadLogs() {
      const res = await Insforge.DB.query('activity_logs', { order: 'created_at.desc', limit: 500 });
      const logs = res.data || [];

      const statusBadges = {
        success: '<span class="badge bg-success">Success</span>',
        failed: '<span class="badge bg-danger">Failed</span>',
        warning: '<span class="badge bg-warning">Warning</span>'
      };
      const roleBadges = {
        admin: '<span class="badge bg-amber">Admin</span>',
        teacher: '<span class="badge bg-info">Teacher</span>',
        student: '<span class="badge bg-success">Student</span>'
      };

      document.getElementById('logsBody').innerHTML = logs.map(l => `<tr>
        <td style="white-space:nowrap;font-size:0.8125rem;">${App.formatDate(l.created_at, { hour: '2-digit', minute: '2-digit' })}</td>
        <td>${App.escapeHtml(l.user_name || '—')}</td>
        <td>${roleBadges[l.role] || l.role || '—'}</td>
        <td><strong>${App.escapeHtml(l.action)}</strong></td>
        <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.8125rem;color:var(--text-secondary);">${App.escapeHtml(l.details || '—')}</td>
        <td>${statusBadges[l.status] || l.status}</td>
      </tr>`).join('');

      $('#logsTable').DataTable({
        pageLength: 25,
        order: [[0, 'desc']],
        language: { emptyTable: 'No activity logs yet' }
      });
    })();

    async function clearOldLogs() {
      const confirmed = await App.confirm('Clear Old Logs', 'Delete logs older than 30 days?', 'Clear');
      if (!confirmed) return;

      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - 30);
      await Insforge.DB.delete('activity_logs', { created_at: `lt.${cutoff.toISOString()}` });
      App.showSuccess('Old logs cleared.');
      location.reload();
    }
  </script>
</body>
</html>
