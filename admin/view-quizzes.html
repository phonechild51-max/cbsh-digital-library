<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Admin — View Quizzes</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/datatables.net-bs5@2.2.2/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>All Quizzes</span>
          <span class="badge bg-amber" id="totalCount">0</span>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover" id="quizzesTable" style="width:100%;">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Subject</th>
                  <th>Duration</th>
                  <th>Total Marks</th>
                  <th>Created By</th>
                  <th>Status</th>
                  <th>Attempts</th>
                  <th>Avg Score</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="quizzesBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net@2.2.2/js/dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net-bs5@2.2.2/js/dataTables.bootstrap5.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    if (!AuthGuard.init('admin')) throw new Error('Not authorized');
    App.initLayout('View Quizzes', 'admin');

    (async function loadQuizzes() {
      const [quizRes, attemptsRes, usersRes] = await Promise.all([
        Insforge.DB.query('quizzes', { order: 'created_at.desc' }),
        Insforge.DB.query('quiz_attempts'),
        Insforge.DB.query('users', { select: 'id,name' })
      ]);

      const quizzes = quizRes.data || [];
      const attempts = attemptsRes.data || [];
      const users = {};
      (usersRes.data || []).forEach(u => users[u.id] = u.name);

      document.getElementById('totalCount').textContent = quizzes.length;

      const tbody = document.getElementById('quizzesBody');
      tbody.innerHTML = quizzes.map(q => {
        const qAttempts = attempts.filter(a => a.quiz_id === q.id);
        const avgScore = qAttempts.length > 0
          ? (qAttempts.reduce((sum, a) => sum + a.percentage, 0) / qAttempts.length).toFixed(1) + '%'
          : '—';

        const statusBadge = {
          draft: '<span class="badge bg-secondary">Draft</span>',
          published: '<span class="badge bg-success">Published</span>',
          expired: '<span class="badge bg-warning">Expired</span>'
        };

        return `<tr>
          <td>${App.escapeHtml(q.title)}</td>
          <td><span class="badge bg-secondary">${App.escapeHtml(q.subject)}</span></td>
          <td>${q.duration} min</td>
          <td>${q.total_marks}</td>
          <td>${App.escapeHtml(users[q.created_by] || 'Unknown')}</td>
          <td>${statusBadge[q.status] || q.status}</td>
          <td><span class="font-mono">${qAttempts.length}</span></td>
          <td><span class="font-mono">${avgScore}</span></td>
          <td>
            <button class="btn btn-sm btn-danger" onclick="deleteQuiz('${q.id}')" title="Delete">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>`;
      }).join('');

      $('#quizzesTable').DataTable({
        pageLength: 15,
        order: [[5, 'asc']],
        language: { emptyTable: 'No quizzes created yet' }
      });
    })();

    async function deleteQuiz(id) {
      const confirmed = await App.confirm('Delete Quiz', 'This will permanently delete the quiz, all questions, and all attempts.', 'Delete');
      if (!confirmed) return;

      App.showLoading();
      await Insforge.DB.delete('quizzes', { id: `eq.${id}` });
      AuthGuard.logActivity('DELETE_QUIZ', `Deleted quiz ${id}`);
      App.hideLoading();
      App.showSuccess('Quiz deleted.');
      location.reload();
    }
  </script>
</body>
</html>
