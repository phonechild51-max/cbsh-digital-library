<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Admin — Settings</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">

      <!-- System Info -->
      <div class="card mb-4">
        <div class="card-header"><i class="bi bi-info-circle me-2"></i>System Information</div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-4">
              <div class="stat-card">
                <div class="stat-label">Total Users</div>
                <div class="stat-value" id="totalUsers">—</div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="stat-card">
                <div class="stat-label">Total Materials</div>
                <div class="stat-value" id="totalMaterials">—</div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="stat-card">
                <div class="stat-label">Total Quizzes</div>
                <div class="stat-value" id="totalQuizzes">—</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- General Settings -->
      <div class="card mb-4">
        <div class="card-header"><i class="bi bi-gear me-2"></i>General Settings</div>
        <div class="card-body">
          <form id="settingsForm">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="siteName" class="form-label">Site Name</label>
                <input type="text" class="form-control" id="siteName" placeholder="CBSH Digital Library">
              </div>
              <div class="col-md-6">
                <label for="maintenanceMode" class="form-label">Maintenance Mode</label>
                <select class="form-select" id="maintenanceMode">
                  <option value="off">Off</option>
                  <option value="on">On — Only admins can access</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="maxUploadSize" class="form-label">Max Upload Size (MB)</label>
                <input type="number" class="form-control" id="maxUploadSize" placeholder="25" min="1" max="100">
              </div>
              <div class="col-md-6">
                <label for="defaultQuizDuration" class="form-label">Default Quiz Duration (min)</label>
                <input type="number" class="form-control" id="defaultQuizDuration" placeholder="30" min="5" max="180">
              </div>
              <div class="col-md-12">
                <label for="welcomeMessage" class="form-label">Welcome Message</label>
                <textarea class="form-control" id="welcomeMessage" rows="2" placeholder="Welcome to CBSH Digital Library!"></textarea>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save Settings</button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Danger Zone -->
      <div class="card" style="border-color:var(--danger) !important;">
        <div class="card-header" style="color:var(--danger);">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>Danger Zone
        </div>
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
              <strong>Clear All Activity Logs</strong>
              <p class="mb-0" style="font-size:0.8125rem;color:var(--text-secondary);">Remove all activity log records.</p>
            </div>
            <button class="btn btn-danger btn-sm" onclick="clearAllLogs()">Clear Logs</button>
          </div>
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <strong>Clear All Notifications</strong>
              <p class="mb-0" style="font-size:0.8125rem;color:var(--text-secondary);">Remove all notification records for all users.</p>
            </div>
            <button class="btn btn-danger btn-sm" onclick="clearAllNotifications()">Clear Notifications</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    if (!AuthGuard.init('admin')) throw new Error('Not authorized');
    App.initLayout('Settings', 'admin');

    const SETTING_KEYS = ['site_name', 'maintenance_mode', 'max_upload_size', 'default_quiz_duration', 'welcome_message'];
    const fieldMap = {
      site_name: 'siteName',
      maintenance_mode: 'maintenanceMode',
      max_upload_size: 'maxUploadSize',
      default_quiz_duration: 'defaultQuizDuration',
      welcome_message: 'welcomeMessage'
    };

    // Load system info and settings
    (async function load() {
      const [usersRes, matRes, quizRes, settingsRes] = await Promise.all([
        Insforge.DB.query('users', { select: 'id' }),
        Insforge.DB.query('materials', { select: 'id' }),
        Insforge.DB.query('quizzes', { select: 'id' }),
        Insforge.DB.query('settings')
      ]);

      document.getElementById('totalUsers').textContent = usersRes.data?.length || 0;
      document.getElementById('totalMaterials').textContent = matRes.data?.length || 0;
      document.getElementById('totalQuizzes').textContent = quizRes.data?.length || 0;

      // Populate settings fields
      const settings = settingsRes.data || [];
      settings.forEach(s => {
        const fieldId = fieldMap[s.setting_key];
        if (fieldId) {
          const el = document.getElementById(fieldId);
          if (el) el.value = s.setting_value || '';
        }
      });
    })();

    // Save settings
    document.getElementById('settingsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      App.showLoading();

      const updates = SETTING_KEYS.map(key => {
        const fieldId = fieldMap[key];
        const el = document.getElementById(fieldId);
        return { setting_key: key, setting_value: el?.value || '', updated_at: new Date().toISOString() };
      });

      // Upsert each setting
      for (const s of updates) {
        const existing = await Insforge.DB.query('settings', { filters: { setting_key: `eq.${s.setting_key}` }, limit: 1 });
        if (existing.data?.length) {
          await Insforge.DB.update('settings', { setting_key: `eq.${s.setting_key}` }, s);
        } else {
          await Insforge.DB.insert('settings', s);
        }
      }

      AuthGuard.logActivity('UPDATE_SETTINGS', 'System settings updated');
      App.hideLoading();
      App.showSuccess('Settings saved successfully!');
    });

    async function clearAllLogs() {
      const confirmed = await App.confirm('Clear All Logs', 'This will permanently delete ALL activity logs.', 'Clear All');
      if (!confirmed) return;
      App.showLoading();
      await Insforge.DB.delete('activity_logs', { id: 'neq.00000000-0000-0000-0000-000000000000' });
      App.hideLoading();
      App.showSuccess('All logs cleared.');
    }

    async function clearAllNotifications() {
      const confirmed = await App.confirm('Clear All Notifications', 'This will permanently delete ALL notifications for ALL users.', 'Clear All');
      if (!confirmed) return;
      App.showLoading();
      await Insforge.DB.delete('notifications', { id: 'neq.00000000-0000-0000-0000-000000000000' });
      App.hideLoading();
      App.showSuccess('All notifications cleared.');
    }
  </script>
</body>
</html>
