<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Admin — Approve Users</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">

      <!-- Filter Tabs -->
      <ul class="nav nav-tabs mb-4" id="approvalTabs">
        <li class="nav-item">
          <button class="nav-link active" data-filter="pending" onclick="filterUsers('pending', this)">
            Pending <span class="badge bg-warning ms-1" id="pendingCount">0</span>
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-filter="email_verified" onclick="filterUsers('email_verified', this)">
            Email Verified <span class="badge bg-amber ms-1" id="verifiedCount">0</span>
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-filter="approved" onclick="filterUsers('approved', this)">Approved</button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-filter="denied" onclick="filterUsers('denied', this)">Denied</button>
        </li>
      </ul>

      <!-- Users Grid -->
      <div class="row g-3" id="usersGrid">
        <div class="col-12 text-center py-4" style="color:var(--text-disabled);">Loading...</div>
      </div>
    </div>
  </div>



  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    if (!AuthGuard.init('admin')) throw new Error('Not authorized');
    App.initLayout('Approve Users', 'admin');

    let allUsers = [];
    let currentFilter = 'pending';

    async function loadUsers() {
      const res = await Insforge.DB.query('users', { order: 'created_at.desc' });
      allUsers = (res.data || []).filter(u => u.role !== 'admin');

      document.getElementById('pendingCount').textContent = allUsers.filter(u => u.status === 'pending').length;
      document.getElementById('verifiedCount').textContent = allUsers.filter(u => u.status === 'email_verified').length;

      renderUsers();
    }

    function filterUsers(status, btnEl) {
      currentFilter = status;
      document.querySelectorAll('#approvalTabs .nav-link').forEach(b => b.classList.remove('active'));
      btnEl.classList.add('active');
      renderUsers();
    }

    function renderUsers() {
      const filtered = allUsers.filter(u => u.status === currentFilter);
      const grid = document.getElementById('usersGrid');

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="col-12"><div class="empty-state">
          <i class="bi bi-person-check"></i>
          <h5>No ${currentFilter} users</h5>
          <p>All caught up!</p>
        </div></div>`;
        return;
      }

      grid.innerHTML = filtered.map((u, i) => {
        const roleBadge = u.role === 'teacher'
          ? '<span class="badge bg-info">Teacher</span>'
          : '<span class="badge bg-success">Student</span>';

        const actionBtns = (currentFilter === 'pending' || currentFilter === 'email_verified') ? `
          <div class="d-flex gap-2 mt-3">
            <button class="btn btn-success btn-sm flex-fill" onclick="approveUser('${u.id}')">
              <i class="bi bi-check-lg me-1"></i>Approve
            </button>
            <button class="btn btn-danger btn-sm flex-fill" onclick="denyUser('${u.id}')">
              <i class="bi bi-x-lg me-1"></i>Deny
            </button>
          </div>` : currentFilter === 'denied' ? `
          <div class="mt-3">
            <button class="btn btn-success btn-sm w-100" onclick="approveUser('${u.id}')">
              <i class="bi bi-check-lg me-1"></i>Re-approve
            </button>
          </div>` : '';

        return `
          <div class="col-md-6 col-xl-4">
            <div class="card animate-fade-in-up stagger-${(i % 6) + 1}">
              <div class="card-body">
                <div class="d-flex align-items-start justify-content-between mb-2">
                  <div>
                    <h4 class="mb-1" style="font-size:1rem;">${App.escapeHtml(u.name)}</h4>
                    <p class="mb-0" style="font-size:0.8125rem;">${App.escapeHtml(u.email)}</p>
                  </div>
                  ${roleBadge}
                </div>
                ${u.roll_no ? `<p style="font-size:0.8125rem;color:var(--text-disabled);margin-bottom:0.5rem;"><i class="bi bi-hash me-1"></i>Roll: ${App.escapeHtml(u.roll_no)}</p>` : ''}
                ${u.employee_id ? `<p style="font-size:0.8125rem;color:var(--text-disabled);margin-bottom:0.5rem;"><i class="bi bi-person-badge me-1"></i>Emp ID: ${App.escapeHtml(u.employee_id)}</p>` : ''}
                ${actionBtns}
              </div>
            </div>
          </div>`;
      }).join('');
    }



    async function approveUser(userId) {
      const confirmed = await App.confirm('Approve User', 'This user will be able to log in and access the system.', 'Approve', 'question');
      if (!confirmed) return;

      App.showLoading();
      const res = await Insforge.DB.update('users', { id: `eq.${userId}` }, { status: 'approved' });
      App.hideLoading();

      if (res.error) { App.showError('Failed to approve user.'); return; }

      AuthGuard.logActivity('APPROVE_USER', `Approved user ${userId}`);
      App.showSuccess('User approved successfully!');
      loadUsers();
    }

    async function denyUser(userId) {
      const confirmed = await App.confirm('Deny User', 'This user will not be able to access the system.', 'Deny', 'warning');
      if (!confirmed) return;

      App.showLoading();
      const res = await Insforge.DB.update('users', { id: `eq.${userId}` }, { status: 'denied' });
      App.hideLoading();

      if (res.error) { App.showError('Failed to deny user.'); return; }

      AuthGuard.logActivity('DENY_USER', `Denied user ${userId}`);
      App.showSuccess('User denied.');
      loadUsers();
    }

    loadUsers();
  </script>
</body>
</html>
