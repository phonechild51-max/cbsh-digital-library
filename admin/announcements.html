<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Admin — Announcements</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">

      <!-- Create Announcement -->
      <div class="card mb-4">
        <div class="card-header"><i class="bi bi-megaphone-fill me-2"></i>Create Announcement</div>
        <div class="card-body">
          <form id="announceForm">
            <div class="row g-3">
              <div class="col-md-8">
                <label for="annTitle" class="form-label">Title</label>
                <input type="text" class="form-control" id="annTitle" placeholder="Announcement title" required>
              </div>
              <div class="col-md-4">
                <label for="annTarget" class="form-label">Target Audience</label>
                <select class="form-select" id="annTarget">
                  <option value="all">All Users</option>
                  <option value="students">Students Only</option>
                  <option value="teachers">Teachers Only</option>
                </select>
              </div>
              <div class="col-md-8">
                <label for="annContent" class="form-label">Content</label>
                <textarea class="form-control" id="annContent" rows="3" placeholder="Write your announcement..." required></textarea>
              </div>
              <div class="col-md-4">
                <label for="annPriority" class="form-label">Priority</label>
                <select class="form-select" id="annPriority">
                  <option value="normal">Normal</option>
                  <option value="important">Important</option>
                  <option value="urgent">Urgent</option>
                </select>
                <label for="annExpiry" class="form-label mt-3">Expiry Date <span class="text-muted" style="font-size:0.75rem;">(optional)</span></label>
                <input type="date" class="form-control" id="annExpiry">
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary"><i class="bi bi-send me-1"></i>Publish</button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Existing Announcements -->
      <div class="card">
        <div class="card-header">Published Announcements</div>
        <div class="card-body p-0">
          <div id="announcementsList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Announcement Modal -->
  <div class="modal fade" id="editAnnModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Announcement</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editAnnId">
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" class="form-control" id="editAnnTitle">
          </div>
          <div class="mb-3">
            <label class="form-label">Content</label>
            <textarea class="form-control" id="editAnnContent" rows="3"></textarea>
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Target Audience</label>
              <select class="form-select" id="editAnnTarget">
                <option value="all">All Users</option>
                <option value="students">Students Only</option>
                <option value="teachers">Teachers Only</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Priority</label>
              <select class="form-select" id="editAnnPriority">
                <option value="normal">Normal</option>
                <option value="important">Important</option>
                <option value="urgent">Urgent</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">Expiry Date <span style="color:var(--text-disabled);font-size:0.8em;">(optional)</span></label>
              <input type="date" class="form-control" id="editAnnExpiry">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary" onclick="saveEditedAnnouncement()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    if (!AuthGuard.init('admin')) throw new Error('Not authorized');
    App.initLayout('Announcements', 'admin');

    async function loadAnnouncements() {
      const res = await Insforge.DB.query('announcements', { order: 'created_at.desc' });
      const items = res.data || [];
      _allItems = items; // store for editAnnouncement() lookup
      const list = document.getElementById('announcementsList');

      if (items.length === 0) {
        list.innerHTML = '<div class="empty-state"><i class="bi bi-megaphone"></i><h5>No announcements</h5><p>Create your first announcement above.</p></div>';
        return;
      }

      const priorityBadge = { normal: 'bg-secondary', important: 'bg-warning', urgent: 'bg-danger' };
      const targetBadge = { all: 'All Users', students: 'Students', teachers: 'Teachers' };

      list.innerHTML = items.map(a => `
        <div class="d-flex justify-content-between align-items-start p-3 border-bottom" style="border-color:var(--border-divider)!important;">
          <div class="flex-grow-1">
            <div class="d-flex align-items-center gap-2 mb-1">
              <h5 style="font-size:1rem;margin:0;">${App.escapeHtml(a.title)}</h5>
              <span class="badge ${priorityBadge[a.priority]}">${a.priority}</span>
              <span class="badge bg-info">${targetBadge[a.target_role]}</span>
            </div>
            <p style="font-size:0.875rem;margin:0.25rem 0 0.5rem;">${App.escapeHtml(a.content)}</p>
            <span style="font-size:0.75rem;color:var(--text-disabled);">
              ${App.formatDate(a.created_at)}
              ${a.expiry_date ? ` · Expires ${App.formatDate(a.expiry_date)}` : ''}
            </span>
          </div>
          <div class="d-flex gap-2 ms-3">
            <button class="btn btn-sm btn-secondary" onclick="editAnnouncement('${a.id}')" title="Edit"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-danger" onclick="deleteAnnouncement('${a.id}')" title="Delete"><i class="bi bi-trash"></i></button>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('announceForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const title = document.getElementById('annTitle').value.trim();
      const content = document.getElementById('annContent').value.trim();
      const target = document.getElementById('annTarget').value;
      const priority = document.getElementById('annPriority').value;
      const expiry = document.getElementById('annExpiry').value || null;

      if (!title || !content) { App.showError('Title and content are required.'); return; }

      const user = AuthGuard.getUser();
      const res = await Insforge.DB.insert('announcements', {
        title, content,
        target_role: target,
        priority,
        expiry_date: expiry ? new Date(expiry).toISOString() : null,
        created_by: user.id
      });

      if (res.error) { App.showError('Failed to create announcement.'); return; }

      AuthGuard.logActivity('CREATE_ANNOUNCEMENT', `Created: ${title}`);

      // Send notifications to target users (fire and forget)
      (async () => {
        try {
          const roleFilter = target === 'all'
            ? { status: 'eq.approved' }
            : { status: 'eq.approved', role: target === 'students' ? 'eq.student' : 'eq.teacher' };
          const usersRes = await Insforge.DB.query('users', { filters: roleFilter, select: 'id', limit: 500 });
          const targetUsers = usersRes.data || [];
          const usersToNotify = targetUsers.slice(0, 500);
          if (targetUsers.length > 500) {
            console.warn(`[Announcements] ${targetUsers.length} users matched but notifications capped at 500.`);
          }
          for (const u of usersToNotify) {
            Notifications.create(u.id, `\u{1F4E2} New announcement: ${title}`, priority === 'urgent' ? 'warning' : 'info');
          }
        } catch (e) { console.warn('[Announcements] Failed to send notifications:', e); }
      })();

      App.showSuccess('Announcement published!');
      document.getElementById('announceForm').reset();
      loadAnnouncements();
    });

    async function deleteAnnouncement(id) {
      const confirmed = await App.confirm('Delete Announcement', 'Remove this announcement?', 'Delete');
      if (!confirmed) return;

      await Insforge.DB.delete('announcements', { id: `eq.${id}` });
      AuthGuard.logActivity('DELETE_ANNOUNCEMENT', `Deleted announcement ${id}`);
      App.showSuccess('Announcement deleted.');
      loadAnnouncements();
    }

    let _allItems = [];
    function editAnnouncement(id) {
      const a = _allItems.find(x => x.id === id);
      if (!a) return;
      document.getElementById('editAnnId').value = a.id;
      document.getElementById('editAnnTitle').value = a.title;
      document.getElementById('editAnnContent').value = a.content;
      document.getElementById('editAnnTarget').value = a.target_role;
      document.getElementById('editAnnPriority').value = a.priority;
      document.getElementById('editAnnExpiry').value = a.expiry_date ? a.expiry_date.slice(0, 10) : '';
      new bootstrap.Modal(document.getElementById('editAnnModal')).show();
    }

    async function saveEditedAnnouncement() {
      const id = document.getElementById('editAnnId').value;
      const title = document.getElementById('editAnnTitle').value.trim();
      const content = document.getElementById('editAnnContent').value.trim();
      if (!title || !content) { App.showError('Title and content required.'); return; }
      App.showLoading();
      await Insforge.DB.update('announcements', { id: `eq.${id}` }, {
        title,
        content,
        target_role: document.getElementById('editAnnTarget').value,
        priority: document.getElementById('editAnnPriority').value,
        expiry_date: document.getElementById('editAnnExpiry').value ? new Date(document.getElementById('editAnnExpiry').value).toISOString() : null
      });
      bootstrap.Modal.getInstance(document.getElementById('editAnnModal')).hide();
      App.hideLoading();
      App.showSuccess('Announcement updated!');
      loadAnnouncements();
    }

    loadAnnouncements();
  </script>
</body>
</html>
