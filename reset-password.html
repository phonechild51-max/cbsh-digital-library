<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Digital Library — Reset Password</title>
  <link rel="icon" href="assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card animate-fade-in-up">
      <div class="auth-logo">
        <img src="assets/images/cbsh-logo.jpg" alt="CBSH Logo">
        <h1>Reset Password</h1>
        <p>Enter the code from your email and set a new password</p>
      </div>

      <!-- Step 1: Enter Code -->
      <div id="step1">
        <form id="codeForm" novalidate>
          <div class="mb-3">
            <label for="resetCode" class="form-label">6-Digit Reset Code</label>
            <input type="text" class="form-control text-center" id="resetCode" maxlength="6" placeholder="000000"
              style="font-family:var(--font-mono);font-size:1.5rem;letter-spacing:8px;font-weight:700;" inputmode="numeric">
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg" id="codeBtn">
            <span id="codeBtnText">Verify Code</span>
            <span id="codeSpinner" class="cbsh-spinner ms-2" style="display:none;"></span>
          </button>
        </form>
      </div>

      <!-- Step 2: New Password -->
      <div id="step2" style="display:none;">
        <form id="resetForm" novalidate>
          <div class="mb-3">
            <label for="newPassword" class="form-label">New Password</label>
            <div class="password-toggle">
              <input type="password" class="form-control" id="newPassword" placeholder="Enter new password" required>
              <button type="button" class="toggle-btn" onclick="togglePw('newPassword','newEye')">
                <i class="bi bi-eye" id="newEye"></i>
              </button>
            </div>
          </div>
          <div class="mb-3">
            <label for="confirmNewPassword" class="form-label">Confirm Password</label>
            <div class="password-toggle">
              <input type="password" class="form-control" id="confirmNewPassword" placeholder="Re-enter new password" required>
              <button type="button" class="toggle-btn" onclick="togglePw('confirmNewPassword','newEye2')">
                <i class="bi bi-eye" id="newEye2"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg" id="resetBtn">
            <span id="resetBtnText">Reset Password</span>
            <span id="resetSpinner" class="cbsh-spinner ms-2" style="display:none;"></span>
          </button>
        </form>
      </div>

      <div class="auth-footer">
        <a href="index.html"><i class="bi bi-arrow-left"></i> Back to Login</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/insforge.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const email = params.get('email') || '';
    let resetToken = '';

    function togglePw(id, iconId) {
      const inp = document.getElementById(id);
      const ico = document.getElementById(iconId);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      ico.className = inp.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
    }

    // Step 1: Exchange code for token
    document.getElementById('codeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = document.getElementById('resetCode').value.trim();
      if (code.length !== 6) { App.showError('Please enter the full 6-digit code.'); return; }

      const btn = document.getElementById('codeBtn');
      btn.disabled = true;
      document.getElementById('codeBtnText').textContent = 'Verifying...';
      document.getElementById('codeSpinner').style.display = 'inline-block';

      const res = await Insforge.Auth.exchangeResetCode(email, code);

      if (res.error) {
        App.showError(res.error.message || 'Invalid or expired code.');
        btn.disabled = false;
        document.getElementById('codeBtnText').textContent = 'Verify Code';
        document.getElementById('codeSpinner').style.display = 'none';
        return;
      }

      resetToken = res.data?.token;
      if (!resetToken) { App.showError('Failed to get reset token.'); return; }

      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';
      App.showSuccess('Code verified! Set your new password.');
    });

    // Step 2: Reset password
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPw = document.getElementById('newPassword').value;
      const confirmPw = document.getElementById('confirmNewPassword').value;

      if (newPw.length < 8) { App.showError('Password must be at least 8 characters.'); return; }
      if (newPw !== confirmPw) { App.showError('Passwords do not match.'); return; }

      const btn = document.getElementById('resetBtn');
      btn.disabled = true;
      document.getElementById('resetBtnText').textContent = 'Resetting...';
      document.getElementById('resetSpinner').style.display = 'inline-block';

      const res = await Insforge.Auth.resetPassword(newPw, resetToken);

      if (res.error) {
        App.showError(res.error.message || 'Failed to reset password.');
        btn.disabled = false;
        document.getElementById('resetBtnText').textContent = 'Reset Password';
        document.getElementById('resetSpinner').style.display = 'none';
        return;
      }

      await Swal.fire({
        icon: 'success',
        title: 'Password Reset!',
        text: 'Your password has been changed successfully.',
        confirmButtonText: 'Go to Login'
      });
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
