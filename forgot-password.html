<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Digital Library — Forgot Password</title>
  <link rel="icon" href="assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card animate-fade-in-up">
      <div class="auth-logo">
        <img src="assets/images/cbsh-logo.jpg" alt="CBSH Logo">
        <h1>Forgot Password</h1>
        <p>Enter your email to receive a reset code</p>
      </div>

      <form id="forgotForm" novalidate>
        <div class="mb-3">
          <label for="forgotEmail" class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" id="forgotEmail" placeholder="you@cbsh.edu" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 btn-lg" id="forgotBtn">
          <span id="forgotBtnText">Send Reset Code</span>
          <span id="forgotSpinner" class="cbsh-spinner ms-2" style="display:none;"></span>
        </button>
      </form>

      <div class="auth-footer">
        <a href="index.html"><i class="bi bi-arrow-left"></i> Back to Login</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="js/config.js"></script>
  <script src="js/insforge.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgotEmail').value.trim();
      if (!email) { App.showError('Please enter your email address.'); return; }

      const btn = document.getElementById('forgotBtn');
      btn.disabled = true;
      document.getElementById('forgotBtnText').textContent = 'Sending...';
      document.getElementById('forgotSpinner').style.display = 'inline-block';

      const res = await Insforge.Auth.sendPasswordResetEmail(email);

      btn.disabled = false;
      document.getElementById('forgotBtnText').textContent = 'Send Reset Code';
      document.getElementById('forgotSpinner').style.display = 'none';

      if (res.error) {
        App.showError(res.error.message || 'Failed to send reset email.');
        return;
      }

      await Swal.fire({
        icon: 'success',
        title: 'Code Sent!',
        text: 'A password reset code has been sent to your email. It expires in 1 hour.',
        confirmButtonText: 'Enter Code'
      });

      window.location.href = `reset-password.html?email=${encodeURIComponent(email)}`;
    });
  </script>
</body>
</html>
