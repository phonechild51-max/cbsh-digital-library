<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Student — Dashboard</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">

      <!-- Welcome -->
      <div class="card mb-4" style="background:linear-gradient(135deg, rgba(212,146,42,0.08), rgba(42,109,212,0.05)) !important;">
        <div class="card-body">
          <h2 id="welcomeMsg" style="font-size:1.5rem;">Welcome back!</h2>
          <p style="font-size:0.875rem;">Your academic progress at a glance.</p>
        </div>
      </div>

      <!-- Stat Cards -->
      <div class="row g-3 mb-4" id="statCards"></div>

      <!-- Charts -->
      <div class="row g-3 mb-4">
        <div class="col-lg-8">
          <div class="card">
            <div class="card-header">Quiz Score Trend</div>
            <div class="card-body" style="height:300px;">
              <canvas id="scoreTrendChart"></canvas>
            </div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="card">
            <div class="card-header">Performance Summary</div>
            <div class="card-body d-flex align-items-center justify-content-center" style="height:300px;">
              <canvas id="perfChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- Recent Activity & Announcements -->
      <div class="row g-3">
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header">Recent Downloads</div>
            <div class="card-body p-0">
              <div id="recentDownloads"></div>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <span>Announcements</span>
              <a href="announcements.html" class="btn btn-sm btn-secondary">View All</a>
            </div>
            <div class="card-body p-0">
              <div id="recentAnnouncements"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    if (!AuthGuard.init('student')) throw new Error('Not authorized');
    App.initLayout('Dashboard', 'student');

    Chart.defaults.color = '#C4A882';
    Chart.defaults.borderColor = '#2A1C0A';
    Chart.defaults.font.family = "'DM Sans', sans-serif";

    const user = AuthGuard.getUser();
    document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.name}!`;

    (async function load() {
      const [dlRes, bookRes, attRes, annRes, matRes] = await Promise.all([
        Insforge.DB.query('downloads', { filters: { student_id: `eq.${user.id}` }, order: 'downloaded_at.desc' }),
        Insforge.DB.query('bookmarks', { filters: { student_id: `eq.${user.id}` } }),
        Insforge.DB.query('quiz_attempts', { filters: { student_id: `eq.${user.id}` }, order: 'attempt_date.desc' }),
        Insforge.DB.query('announcements', { filters: { target_role: 'in.(all,students)' }, order: 'created_at.desc', limit: 5 }),
        Insforge.DB.query('materials', { select: 'id,title' })
      ]);

      const downloads = dlRes.data || [];
      const bookmarks = bookRes.data || [];
      const attempts = attRes.data || [];
      const announcements = annRes.data || [];
      const materialsMap = {};
      (matRes.data || []).forEach(m => materialsMap[m.id] = m.title);

      const passed = attempts.filter(a => a.status === 'pass').length;
      const avgPct = attempts.length > 0 ? (attempts.reduce((s, a) => s + a.percentage, 0) / attempts.length).toFixed(1) : 0;

      // Stat cards
      const stats = [
        { icon: 'bi-download', color: 'amber', value: downloads.length, label: 'Downloads' },
        { icon: 'bi-bookmark-star-fill', color: 'blue', value: bookmarks.length, label: 'Bookmarks' },
        { icon: 'bi-pencil-square', color: 'green', value: attempts.length, label: 'Quizzes Taken' },
        { icon: 'bi-trophy-fill', color: 'amber', value: avgPct + '%', label: 'Avg Score' }
      ];

      document.getElementById('statCards').innerHTML = stats.map((s, i) => `
        <div class="col-6 col-xl-3">
          <div class="stat-card animate-fade-in-up stagger-${i + 1}">
            <div class="stat-icon ${s.color}"><i class="bi ${s.icon}"></i></div>
            <div class="stat-value">${s.value}</div>
            <div class="stat-label">${s.label}</div>
          </div>
        </div>
      `).join('');

      // Score trend
      const recentAttempts = attempts.slice(0, 10).reverse();
      new Chart(document.getElementById('scoreTrendChart'), {
        type: 'line',
        data: {
          labels: recentAttempts.map((_, i) => `Quiz ${i + 1}`),
          datasets: [{
            label: 'Score %', data: recentAttempts.map(a => a.percentage),
            borderColor: '#D4922A', backgroundColor: 'rgba(212,146,42,0.1)', fill: true, tension: 0.4
          }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, max: 100 } }
        }
      });

      // Performance doughnut
      new Chart(document.getElementById('perfChart'), {
        type: 'doughnut',
        data: {
          labels: ['Passed', 'Failed'],
          datasets: [{ data: [passed, attempts.length - passed], backgroundColor: ['#10B981', '#EF4444'], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
      });

      // Recent downloads
      const rdContainer = document.getElementById('recentDownloads');
      const recentDl = downloads.slice(0, 5);
      rdContainer.innerHTML = recentDl.length === 0
        ? '<div class="p-3 text-center" style="color:var(--text-disabled);">No downloads yet</div>'
        : recentDl.map(d => `
            <div class="d-flex align-items-center gap-2 p-3 border-bottom" style="border-color:var(--border-divider)!important;">
              <i class="bi bi-file-earmark-arrow-down text-amber"></i>
              <div class="flex-grow-1">
                <div style="font-size:0.875rem;">${App.escapeHtml(materialsMap[d.material_id] || 'Material')}</div>
                <span style="font-size:0.75rem;color:var(--text-disabled);">${App.timeAgo(d.downloaded_at)}</span>
              </div>
            </div>
          `).join('');

      // Announcements
      const annContainer = document.getElementById('recentAnnouncements');
      annContainer.innerHTML = announcements.length === 0
        ? '<div class="p-3 text-center" style="color:var(--text-disabled);">No announcements</div>'
        : announcements.map(a => {
            const badge = { normal: 'bg-secondary', important: 'bg-warning', urgent: 'bg-danger' };
            return `<div class="p-3 border-bottom" style="border-color:var(--border-divider)!important;">
              <div class="d-flex gap-2 align-items-center mb-1">
                <strong style="font-size:0.875rem;">${App.escapeHtml(a.title)}</strong>
                <span class="badge ${badge[a.priority]}">${a.priority}</span>
              </div>
              <p style="font-size:0.8125rem;margin:0;color:var(--text-secondary);">${App.escapeHtml(a.content).slice(0, 100)}${a.content.length > 100 ? '...' : ''}</p>
              <span style="font-size:0.7rem;color:var(--text-disabled);">${App.timeAgo(a.created_at)}</span>
            </div>`;
          }).join('');
    })();
  </script>
</body>
</html>
