<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Student — Bookmarks</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">
      <div class="row g-3" id="bookmarksGrid"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    if (!AuthGuard.init('student')) throw new Error('Not authorized');
    App.initLayout('Bookmarks', 'student');
    const user = AuthGuard.getUser();

    async function loadBookmarks() {
      const [bkRes, matRes] = await Promise.all([
        Insforge.DB.query('bookmarks', { filters: { user_id: `eq.${user.id}` }, order: 'created_at.desc' }),
        Insforge.DB.query('materials')
      ]);
      const bookmarks = bkRes.data || [];
      const matMap = {};
      (matRes.data || []).forEach(m => matMap[m.id] = m);

      const grid = document.getElementById('bookmarksGrid');
      if (bookmarks.length === 0) {
        grid.innerHTML = '<div class="col-12"><div class="empty-state"><i class="bi bi-bookmark-star"></i><h5>No bookmarks</h5><p>Browse materials and bookmark your favorites.</p></div></div>';
        return;
      }

      grid.innerHTML = bookmarks.map((b, i) => {
        const m = matMap[b.material_id];
        if (!m) return '';
        const icon = m.file_type === 'pdf' ? 'bi-file-earmark-pdf' : 'bi-file-earmark-image';
        return `<div class="col-sm-6 col-lg-4 col-xl-3">
          <div class="material-card animate-fade-in-up stagger-${(i % 6) + 1}">
            <div class="material-thumb"><i class="bi ${icon}"></i></div>
            <div class="material-info">
              <div class="material-title">${App.escapeHtml(m.title)}</div>
              <span class="badge bg-secondary">${App.escapeHtml(m.subject)}</span>
              <div class="material-meta">
                <span><i class="bi bi-download"></i> ${m.download_count || 0}</span>
              </div>
            </div>
            <div class="material-actions">
              <a href="preview-material.html?id=${m.id}" class="btn btn-sm btn-info flex-fill"><i class="bi bi-eye me-1"></i>View</a>
              <button class="btn btn-sm btn-danger" onclick="removeBookmark('${b.id}')"><i class="bi bi-x-lg"></i></button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    async function removeBookmark(id) {
      await Insforge.DB.delete('bookmarks', { id: `eq.${id}` });
      App.showSuccess('Bookmark removed.');
      loadBookmarks();
    }

    loadBookmarks();
  </script>
</body>
</html>
