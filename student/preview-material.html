<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Student — Preview Material</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <style>
    /* PDF Viewer Styles */
    .pdf-viewer-container {
      background: var(--bg-body);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    .pdf-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-card);
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .pdf-toolbar .toolbar-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .pdf-toolbar button {
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      color: var(--text-primary);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.875rem;
    }
    .pdf-toolbar button:hover { border-color: var(--accent-amber); color: var(--accent-amber); }
    .pdf-toolbar button:disabled { opacity: 0.3; cursor: not-allowed; }
    .pdf-toolbar .page-info {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      min-width: 80px;
      text-align: center;
    }
    .pdf-toolbar .zoom-label {
      font-size: 0.75rem;
      color: var(--text-disabled);
      font-family: var(--font-mono);
      min-width: 48px;
      text-align: center;
    }
    .pdf-canvas-wrapper {
      overflow: auto;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      gap: 0.75rem;
      scroll-behavior: smooth;
    }
    .pdf-canvas-wrapper canvas {
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      border-radius: 4px;
      max-width: 100%;
    }
    .pdf-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      color: var(--text-disabled);
    }
    .pdf-loading .progress {
      width: 200px;
      margin-top: 1rem;
    }
    .pdf-page-thumb {
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 6px;
      transition: border-color 0.2s;
      overflow: hidden;
    }
    .pdf-page-thumb:hover, .pdf-page-thumb.active { border-color: var(--accent-amber); }
    .view-mode-btn.active { background: var(--accent-amber) !important; color: #000 !important; border-color: var(--accent-amber) !important; }

    .image-viewer {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 500px;
      padding: 1rem;
    }
    .image-viewer img {
      max-width: 100%;
      max-height: 80vh;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      cursor: zoom-in;
      transition: transform 0.3s ease;
    }
    .image-viewer img.zoomed { transform: scale(1.5); cursor: zoom-out; }
  </style>
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">

      <!-- Back -->
      <a href="browse-materials.html" class="btn btn-sm btn-secondary mb-3"><i class="bi bi-arrow-left me-1"></i>Back to Library</a>

      <div class="row g-4">
        <!-- Preview Area -->
        <div class="col-lg-8">
          <div class="card">
            <div class="card-body p-0" id="previewArea">
              <div class="pdf-loading">
                <div class="cbsh-spinner"></div>
                <p class="mt-2">Loading preview...</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Details Sidebar -->
        <div class="col-lg-4">
          <div class="card mb-3">
            <div class="card-header">Material Details</div>
            <div class="card-body" id="detailsCard">
              <p style="color:var(--text-disabled);">Loading...</p>
            </div>
          </div>

          <!-- Actions -->
          <div class="d-grid gap-2" id="actionBtns" style="display:none !important;"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    // Configure PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    if (!AuthGuard.init('student')) throw new Error('Not authorized');
    App.initLayout('Preview Material', 'student');

    const user = AuthGuard.getUser();
    const materialId = new URLSearchParams(window.location.search).get('id');

    if (!materialId) {
      App.showError('No material specified.');
      setTimeout(() => location.href = 'browse-materials.html', 1500);
      throw new Error('No material ID'); // Stop all further execution
    }

    // PDF Viewer State
    let pdfDoc = null, currentPage = 1, totalPages = 0, currentScale = 1.2;
    let viewMode = 'single'; // 'single' | 'scroll'
    let rendering = false;

    (async function load() {
      try {
        console.log('[Preview] Loading material:', materialId);

        const [matRes, bkRes, uploaderRes] = await Promise.all([
          Insforge.DB.query('materials', { filters: { id: `eq.${materialId}` }, limit: 1 }),
          Insforge.DB.query('bookmarks', { filters: { student_id: `eq.${user.id}`, material_id: `eq.${materialId}` }, limit: 1 }),
          Insforge.DB.query('users', { select: 'id,name' })
        ]);

        console.log('[Preview] DB response:', JSON.stringify(matRes));

        const material = matRes.data?.[0];
        if (!material) {
          App.showError('Material not found.');
          return;
        }

        const uploadersMap = {};
        (uploaderRes.data || []).forEach(u => uploadersMap[u.id] = u.name);
        const isBookmarked = (bkRes.data || []).length > 0;

        // ── Get download URL for the file ──
        console.log('[Preview] Getting download URL for key:', material.insforge_file_key);
        const dlRes = await Insforge.Storage.getDownloadUrl(material.insforge_file_key);
        console.log('[Preview] Download strategy:', JSON.stringify(dlRes));
        const fileUrl = dlRes.data?.url || dlRes.data?.downloadUrl || material.insforge_url;
        console.log('[Preview] Using URL:', fileUrl);

        // ── Render Preview ──
        const previewArea = document.getElementById('previewArea');

        if (material.file_type === 'image') {
          previewArea.innerHTML = `
            <div class="image-viewer">
              <img src="${fileUrl}" alt="${App.escapeHtml(material.title)}" id="previewImage" onclick="toggleImageZoom()">
            </div>`;
        } else {
        // PDF — load with PDF.js
        previewArea.innerHTML = `
          <div class="pdf-viewer-container">
            <div class="pdf-toolbar">
              <div class="toolbar-group">
                <button onclick="pdfPrevPage()" id="prevPageBtn" title="Previous Page"><i class="bi bi-chevron-left"></i></button>
                <span class="page-info" id="pageInfo">— / —</span>
                <button onclick="pdfNextPage()" id="nextPageBtn" title="Next Page"><i class="bi bi-chevron-right"></i></button>
              </div>
              <div class="toolbar-group">
                <button onclick="pdfZoom(-0.2)" title="Zoom Out"><i class="bi bi-dash-lg"></i></button>
                <span class="zoom-label" id="zoomLabel">120%</span>
                <button onclick="pdfZoom(0.2)" title="Zoom In"><i class="bi bi-plus-lg"></i></button>
                <button onclick="pdfFitWidth()" title="Fit Width"><i class="bi bi-arrows-expand"></i></button>
              </div>
              <div class="toolbar-group">
                <button onclick="setViewMode('single')" class="view-mode-btn active" id="singleViewBtn" title="Single Page"><i class="bi bi-file-earmark"></i></button>
                <button onclick="setViewMode('scroll')" class="view-mode-btn" id="scrollViewBtn" title="Scroll All Pages"><i class="bi bi-files"></i></button>
              </div>
            </div>
            <div class="pdf-canvas-wrapper" id="pdfCanvasWrapper">
              <div class="pdf-loading" id="pdfLoading">
                <div class="cbsh-spinner"></div>
                <p class="mt-2">Loading PDF...</p>
                <div class="progress"><div class="progress-bar" id="pdfProgress" style="width:0%"></div></div>
              </div>
            </div>
          </div>`;

        // Load the PDF using the already-fetched URL
        try {
          const loadingTask = pdfjsLib.getDocument(fileUrl);
          loadingTask.onProgress = (progress) => {
            if (progress.total > 0) {
              const pct = Math.round((progress.loaded / progress.total) * 100);
              document.getElementById('pdfProgress').style.width = pct + '%';
            }
          };

          pdfDoc = await loadingTask.promise;
          totalPages = pdfDoc.numPages;
          document.getElementById('pdfLoading').remove();
          renderCurrentView();
        } catch (err) {
          console.error('[Preview] PDF load error:', err);
          previewArea.innerHTML = `
            <div class="pdf-loading">
              <i class="bi bi-exclamation-triangle" style="font-size:3rem;color:var(--warning);"></i>
              <p class="mt-2">Unable to preview PDF in browser.</p>
              <p style="font-size:0.75rem;color:var(--text-disabled);">You can still download it using the button on the right.</p>
            </div>`;
        }
      }

      // Details card
      document.getElementById('detailsCard').innerHTML = `
        <h4 style="font-size:1.125rem;margin-bottom:1rem;">${App.escapeHtml(material.title)}</h4>
        ${material.description ? `<p style="font-size:0.875rem;color:var(--text-secondary);margin-bottom:1rem;">${App.escapeHtml(material.description)}</p>` : ''}
        <div class="d-flex flex-column gap-2">
          <div class="d-flex justify-content-between" style="font-size:0.8125rem;">
            <span style="color:var(--text-disabled);">Subject</span>
            <span class="badge bg-secondary">${App.escapeHtml(material.subject)}</span>
          </div>
          ${material.semester ? `<div class="d-flex justify-content-between" style="font-size:0.8125rem;">
            <span style="color:var(--text-disabled);">Semester</span>
            <span>Sem ${material.semester}</span>
          </div>` : ''}
          <div class="d-flex justify-content-between" style="font-size:0.8125rem;">
            <span style="color:var(--text-disabled);">Type</span>
            <span>${material.file_type?.toUpperCase()}</span>
          </div>
          <div class="d-flex justify-content-between" style="font-size:0.8125rem;">
            <span style="color:var(--text-disabled);">Size</span>
            <span>${App.formatFileSize(material.file_size)}</span>
          </div>
          <div class="d-flex justify-content-between" style="font-size:0.8125rem;">
            <span style="color:var(--text-disabled);">Uploaded by</span>
            <span>${App.escapeHtml(uploadersMap[material.uploaded_by] || 'Unknown')}</span>
          </div>
          <div class="d-flex justify-content-between" style="font-size:0.8125rem;">
            <span style="color:var(--text-disabled);">Date</span>
            <span>${App.formatDate(material.upload_date)}</span>
          </div>
          <div class="d-flex justify-content-between" style="font-size:0.8125rem;">
            <span style="color:var(--text-disabled);">Downloads</span>
            <span class="font-mono">${material.download_count || 0}</span>
          </div>
          ${material.file_type === 'pdf' && totalPages > 0 ? `<div class="d-flex justify-content-between" style="font-size:0.8125rem;">
            <span style="color:var(--text-disabled);">Pages</span>
            <span class="font-mono">${totalPages}</span>
          </div>` : ''}
          ${material.tags ? `<div class="mt-2">${material.tags.split(',').map(t => `<span class="badge bg-secondary me-1">${t.trim()}</span>`).join('')}</div>` : ''}
        </div>
      `;

      // Action buttons
      const actions = document.getElementById('actionBtns');
      actions.removeAttribute('style');
      actions.innerHTML = `
        <button class="btn btn-primary btn-lg" onclick="downloadMaterial()">
          <i class="bi bi-download me-1"></i>Download ${material.file_type?.toUpperCase()}
        </button>
        <button class="btn ${isBookmarked ? 'btn-warning' : 'btn-secondary'}" id="bookmarkBtn" onclick="toggleBookmark()">
          <i class="bi ${isBookmarked ? 'bi-bookmark-star-fill' : 'bi-bookmark-star'} me-1"></i>
          ${isBookmarked ? 'Bookmarked' : 'Add Bookmark'}
        </button>
      `;

      window._currentMaterial = material;
      window._isBookmarked = isBookmarked;

      } catch (err) {
        console.error('[Preview] Load error:', err);
        App.showError(err.message || 'Failed to load material.');
      }
    })();

    // ── PDF Rendering ──────────────────────────────────────────────

    async function renderPage(pageNum, container) {
      const page = await pdfDoc.getPage(pageNum);
      const viewport = page.getViewport({ scale: currentScale });
      const canvas = document.createElement('canvas');
      canvas.className = 'pdf-page';
      canvas.dataset.page = pageNum;
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport: viewport }).promise;
      container.appendChild(canvas);
    }

    async function renderCurrentView() {
      if (!pdfDoc) return;
      const wrapper = document.getElementById('pdfCanvasWrapper');

      if (viewMode === 'single') {
        wrapper.innerHTML = '';
        await renderPage(currentPage, wrapper);
        updatePageInfo();
      } else {
        // Scroll mode — render all pages
        wrapper.innerHTML = '<div class="pdf-loading" id="pdfScrollLoading"><div class="cbsh-spinner"></div><p class="mt-2">Rendering all pages...</p></div>';
        // Render in batches for performance
        const fragment = document.createDocumentFragment();
        for (let i = 1; i <= totalPages; i++) {
          await renderPage(i, fragment);
        }
        wrapper.innerHTML = '';
        wrapper.appendChild(fragment);
        updatePageInfo();
      }
    }

    function updatePageInfo() {
      const info = document.getElementById('pageInfo');
      if (info) info.textContent = viewMode === 'single' ? `${currentPage} / ${totalPages}` : `${totalPages} pages`;
      const prev = document.getElementById('prevPageBtn');
      const next = document.getElementById('nextPageBtn');
      if (prev) prev.disabled = viewMode !== 'single' || currentPage <= 1;
      if (next) next.disabled = viewMode !== 'single' || currentPage >= totalPages;
      const zl = document.getElementById('zoomLabel');
      if (zl) zl.textContent = Math.round(currentScale * 100) + '%';
    }

    function pdfPrevPage() {
      if (currentPage <= 1) return;
      currentPage--;
      renderCurrentView();
    }

    function pdfNextPage() {
      if (currentPage >= totalPages) return;
      currentPage++;
      renderCurrentView();
    }

    function pdfZoom(delta) {
      currentScale = Math.max(0.4, Math.min(3.0, currentScale + delta));
      renderCurrentView();
    }

    function pdfFitWidth() {
      const wrapper = document.getElementById('pdfCanvasWrapper');
      if (!wrapper || !pdfDoc) return;
      pdfDoc.getPage(currentPage).then(page => {
        const defaultVP = page.getViewport({ scale: 1.0 });
        currentScale = (wrapper.clientWidth - 40) / defaultVP.width;
        renderCurrentView();
      });
    }

    function setViewMode(mode) {
      viewMode = mode;
      document.getElementById('singleViewBtn')?.classList.toggle('active', mode === 'single');
      document.getElementById('scrollViewBtn')?.classList.toggle('active', mode === 'scroll');
      renderCurrentView();
    }

    // ── Image Zoom ─────────────────────────────────────────────────

    function toggleImageZoom() {
      const img = document.getElementById('previewImage');
      if (img) img.classList.toggle('zoomed');
    }

    // ── Download & Bookmark ────────────────────────────────────────

    async function downloadMaterial() {
      const m = window._currentMaterial;
      const dlRes = await Insforge.Storage.getDownloadUrl(m.insforge_file_key);
      const url = dlRes.data?.url || dlRes.data?.downloadUrl;
      if (!url) { App.showError('Download failed.'); return; }

      await Insforge.DB.insert('downloads', { student_id: user.id, material_id: m.id });
      await Insforge.DB.update('materials', { id: `eq.${m.id}` }, { download_count: (m.download_count || 0) + 1 });

      window.open(url, '_blank');
      App.showSuccess('Download started!');
    }

    async function toggleBookmark() {
      const m = window._currentMaterial;
      const btn = document.getElementById('bookmarkBtn');
      if (window._isBookmarked) {
        await Insforge.DB.delete('bookmarks', { student_id: `eq.${user.id}`, material_id: `eq.${m.id}` });
        window._isBookmarked = false;
        btn.className = 'btn btn-secondary';
        btn.innerHTML = '<i class="bi bi-bookmark-star me-1"></i>Add Bookmark';
      } else {
        await Insforge.DB.insert('bookmarks', { student_id: user.id, material_id: m.id });
        window._isBookmarked = true;
        btn.className = 'btn btn-warning';
        btn.innerHTML = '<i class="bi bi-bookmark-star-fill me-1"></i>Bookmarked';
      }
    }

    // ── Keyboard Shortcuts ─────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (!pdfDoc) return;
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); pdfPrevPage(); }
      else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); pdfNextPage(); }
      else if (e.key === '+' || e.key === '=') { e.preventDefault(); pdfZoom(0.2); }
      else if (e.key === '-') { e.preventDefault(); pdfZoom(-0.2); }
    });
  </script>
</body>
</html>
