<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Student — Quiz Results</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">

      <a href="available-quizzes.html" class="btn btn-sm btn-secondary mb-3"><i class="bi bi-arrow-left me-1"></i>Back to Quizzes</a>

      <!-- Result Summary -->
      <div class="card mb-4" id="resultSummary">
        <div class="card-body text-center py-4" style="color:var(--text-disabled);">Loading results...</div>
      </div>

      <!-- Stat Cards -->
      <div class="row g-3 mb-4" id="statsRow" style="display:none;"></div>

      <!-- Answer Review -->
      <div id="reviewSection" style="display:none;">
        <h4 class="mb-3">Answer Review</h4>
        <div id="reviewContainer"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    if (!AuthGuard.init('student')) throw new Error('Not authorized');
    App.initLayout('Quiz Results', 'student');

    const user = AuthGuard.getUser();
    const params = new URLSearchParams(window.location.search);
    const quizId = params.get('quiz_id');
    const attemptId = params.get('attempt_id');

    (async function load() {
      // Get quiz, attempt, and questions
      const [qRes, questRes] = await Promise.all([
        Insforge.DB.query('quizzes', { filters: { id: `eq.${quizId}` }, limit: 1 }),
        Insforge.DB.query('questions', { filters: { quiz_id: `eq.${quizId}` } })
      ]);

      const quiz = qRes.data?.[0];
      if (!quiz) { App.showError('Quiz not found.'); return; }

      // Get attempt(s) — either specific or latest
      let attempt;
      if (attemptId) {
        const aRes = await Insforge.DB.query('quiz_attempts', { filters: { id: `eq.${attemptId}` }, limit: 1 });
        attempt = aRes.data?.[0];
      } else {
        const aRes = await Insforge.DB.query('quiz_attempts', { filters: { quiz_id: `eq.${quizId}`, student_id: `eq.${user.id}` }, order: 'attempt_date.desc', limit: 1 });
        attempt = aRes.data?.[0];
      }

      if (!attempt) { App.showError('No attempt found.'); return; }

      const questions = questRes.data || [];
      const answers = attempt.answers ? JSON.parse(attempt.answers) : {};
      const isPassed = attempt.status === 'pass';
      const timeTaken = attempt.time_taken ? `${Math.floor(attempt.time_taken / 60)}m ${attempt.time_taken % 60}s` : '—';

      // Summary card
      document.getElementById('resultSummary').innerHTML = `
        <div class="card-body text-center py-4">
          <i class="bi ${isPassed ? 'bi-trophy-fill text-success' : 'bi-x-circle-fill text-danger'}" style="font-size:4rem;"></i>
          <h2 class="mt-3" style="color:${isPassed ? 'var(--success)' : 'var(--danger)'};">${isPassed ? 'Congratulations!' : 'Better Luck Next Time'}</h2>
          <p style="font-size:1.25rem;">You scored <strong class="font-mono">${attempt.percentage}%</strong> in <strong>${App.escapeHtml(quiz.title)}</strong></p>
          <span class="badge ${isPassed ? 'bg-success' : 'bg-danger'} fs-6">${isPassed ? 'PASSED' : 'FAILED'}</span>
        </div>
      `;

      // Stats
      document.getElementById('statsRow').style.display = '';
      document.getElementById('statsRow').innerHTML = [
        { icon: 'bi-check-circle-fill', color: 'green', value: attempt.score, label: `Score / ${quiz.total_marks}` },
        { icon: 'bi-percent', color: 'amber', value: attempt.percentage + '%', label: 'Percentage' },
        { icon: 'bi-clock', color: 'blue', value: timeTaken, label: 'Time Taken' },
        { icon: 'bi-bullseye', color: 'red', value: quiz.passing_marks, label: 'Pass Marks' }
      ].map((s, i) => `
        <div class="col-6 col-md-3">
          <div class="stat-card animate-fade-in-up stagger-${i + 1}">
            <div class="stat-icon ${s.color}"><i class="bi ${s.icon}"></i></div>
            <div class="stat-value">${s.value}</div>
            <div class="stat-label">${s.label}</div>
          </div>
        </div>
      `).join('');

      // Answer review (if allowed)
      if (quiz.allow_review) {
        document.getElementById('reviewSection').style.display = '';
        document.getElementById('reviewContainer').innerHTML = questions.map((q, i) => {
          const studentAns = answers[q.id] || '—';
          const isCorrect = studentAns === q.correct_answer;
          return `<div class="card mb-2" style="border-left:3px solid ${isCorrect ? 'var(--success)' : 'var(--danger)'};">
            <div class="card-body">
              <div class="d-flex justify-content-between mb-2">
                <span class="badge bg-amber">Q${i + 1}</span>
                <span class="badge ${isCorrect ? 'bg-success' : 'bg-danger'}">${isCorrect ? 'Correct' : 'Incorrect'}</span>
              </div>
              <p style="font-weight:500;margin-bottom:0.75rem;">${App.escapeHtml(q.question_text)}</p>
              <div class="row g-2" style="font-size:0.875rem;">
                ${['A', 'B', 'C', 'D'].map(opt => {
                  const val = q['option_' + opt.toLowerCase()];
                  const isStudentPick = studentAns === opt;
                  const isAnswer = q.correct_answer === opt;
                  let style = '';
                  if (isAnswer) style = 'color:var(--success);font-weight:600;';
                  else if (isStudentPick && !isCorrect) style = 'color:var(--danger);text-decoration:line-through;';
                  return `<div class="col-6"><span style="${style}">${opt}. ${App.escapeHtml(val)} ${isAnswer ? '✓' : ''} ${isStudentPick && !isAnswer ? '✗' : ''}</span></div>`;
                }).join('')}
              </div>
            </div>
          </div>`;
        }).join('');
      }
    })();
  </script>
</body>
</html>
