<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Student — My Downloads</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>My Downloads</span>
          <span class="badge bg-amber" id="dlCount">0</span>
        </div>
        <div class="card-body p-0" id="downloadsList"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    if (!AuthGuard.init('student')) throw new Error('Not authorized');
    App.initLayout('My Downloads', 'student');
    const user = AuthGuard.getUser();

    (async function load() {
      const [dlRes, matRes] = await Promise.all([
        Insforge.DB.query('downloads', { filters: { user_id: `eq.${user.id}` }, order: 'downloaded_at.desc' }),
        Insforge.DB.query('materials', { select: 'id,title,subject,file_type,insforge_file_key' })
      ]);
      const downloads = dlRes.data || [];
      const matMap = {};
      (matRes.data || []).forEach(m => matMap[m.id] = m);

      document.getElementById('dlCount').textContent = downloads.length;
      const list = document.getElementById('downloadsList');

      if (downloads.length === 0) {
        list.innerHTML = '<div class="empty-state"><i class="bi bi-download"></i><h5>No downloads yet</h5><p>Browse the library to get started.</p></div>';
        return;
      }

      list.innerHTML = downloads.map(d => {
        const m = matMap[d.material_id] || {};
        const icon = m.file_type === 'pdf' ? 'bi-file-earmark-pdf text-danger' : 'bi-file-earmark-image text-amber';
        return `<div class="d-flex align-items-center gap-3 p-3 border-bottom" style="border-color:var(--border-divider)!important;">
          <i class="bi ${icon}" style="font-size:1.5rem;"></i>
          <div class="flex-grow-1">
            <div style="font-weight:500;">${App.escapeHtml(m.title || 'Unknown')}</div>
            <span class="badge bg-secondary">${App.escapeHtml(m.subject || '—')}</span>
            <span style="font-size:0.75rem;color:var(--text-disabled);margin-left:0.5rem;">${App.timeAgo(d.downloaded_at)}</span>
          </div>
          <button class="btn btn-sm btn-primary" onclick="redownload('${m.insforge_file_key}')"><i class="bi bi-download"></i></button>
          <a href="preview-material.html?id=${d.material_id}" class="btn btn-sm btn-info"><i class="bi bi-eye"></i></a>
        </div>`;
      }).join('');
    })();

    async function redownload(key) {
      if (!key) { App.showError('File not available.'); return; }
      const res = await Insforge.Storage.getDownloadUrl(key);
      window.open(res.data?.url || res.data?.downloadUrl, '_blank');
    }
  </script>
</body>
</html>
