<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Student — Available Quizzes</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">

      <!-- Filters -->
      <div class="d-flex flex-wrap gap-2 mb-4">
        <div class="cbsh-search flex-grow-1" style="max-width:300px;">
          <i class="bi bi-search"></i>
          <input type="text" class="form-control" id="searchInput" placeholder="Search quizzes...">
        </div>
        <select class="form-select" id="filterSubject" style="max-width:180px;"></select>
      </div>

      <div class="row g-3" id="quizGrid"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    if (!AuthGuard.init('student')) throw new Error('Not authorized');
    App.initLayout('Available Quizzes', 'student');
    App.populateSubjects('filterSubject', true);

    const user = AuthGuard.getUser();
    let allQuizzes = [], myAttempts = [];

    (async function load() {
      const [qRes, aRes] = await Promise.all([
        Insforge.DB.query('quizzes', { filters: { status: 'eq.published' }, order: 'created_at.desc' }),
        Insforge.DB.query('quiz_attempts', { filters: { student_id: `eq.${user.id}` } })
      ]);
      allQuizzes = qRes.data || [];
      myAttempts = aRes.data || [];
      render();
    })();

    function render() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const subject = document.getElementById('filterSubject').value;

      let filtered = [...allQuizzes];
      if (search) filtered = filtered.filter(q => q.title.toLowerCase().includes(search) || q.subject.toLowerCase().includes(search));
      if (subject) filtered = filtered.filter(q => q.subject === subject);

      const grid = document.getElementById('quizGrid');
      if (filtered.length === 0) {
        grid.innerHTML = '<div class="col-12"><div class="empty-state"><i class="bi bi-patch-question"></i><h5>No quizzes available</h5><p>Check back later!</p></div></div>';
        return;
      }

      grid.innerHTML = filtered.map((q, i) => {
        const attempts = myAttempts.filter(a => a.quiz_id === q.id);
        const attemptsLeft = (q.max_attempts || 1) - attempts.length;
        const bestScore = attempts.length > 0 ? Math.max(...attempts.map(a => a.percentage)) : null;
        const canTake = attemptsLeft > 0;

        return `<div class="col-md-6 col-xl-4">
          <div class="quiz-card animate-fade-in-up stagger-${(i % 6) + 1}">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <div class="quiz-title">${App.escapeHtml(q.title)}</div>
              ${bestScore !== null ? `<span class="badge ${bestScore >= 70 ? 'bg-success' : bestScore >= 40 ? 'bg-warning' : 'bg-danger'}">${bestScore}%</span>` : ''}
            </div>
            <span class="badge bg-secondary mb-2">${App.escapeHtml(q.subject)}</span>
            ${q.description ? `<p style="font-size:0.8125rem;color:var(--text-secondary);margin:0.25rem 0;">${App.escapeHtml(q.description).slice(0, 80)}${q.description.length > 80 ? '...' : ''}</p>` : ''}
            <div class="quiz-meta">
              <span><i class="bi bi-clock"></i> ${q.duration} min</span>
              <span><i class="bi bi-star"></i> ${q.total_marks} marks</span>
              <span><i class="bi bi-arrow-repeat"></i> ${attemptsLeft > 0 ? attemptsLeft + ' left' : 'No attempts'}</span>
            </div>
            <div class="mt-3">
              ${canTake
                ? `<a href="quiz-instructions.html?id=${q.id}" class="btn btn-primary btn-sm w-100"><i class="bi bi-play-fill me-1"></i>${attempts.length > 0 ? 'Retake Quiz' : 'Start Quiz'}</a>`
                : `<button class="btn btn-secondary btn-sm w-100" disabled>Max Attempts Reached</button>`}
              ${attempts.length > 0 ? `<a href="quiz-results.html?quiz_id=${q.id}" class="btn btn-sm btn-info w-100 mt-2"><i class="bi bi-bar-chart me-1"></i>View Results</a>` : ''}
            </div>
          </div>
        </div>`;
      }).join('');
    }

    document.getElementById('searchInput').addEventListener('input', App.debounce(render));
    document.getElementById('filterSubject').addEventListener('change', render);
  </script>
</body>
</html>
