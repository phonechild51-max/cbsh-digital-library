<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CBSH Digital Library — Login to access study materials, quizzes, and academic resources." />
    <title>CBSH Digital Library — Login</title>

    <link rel="icon" href="assets/images/cbsh-logo.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="css/theme.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet" />

    <style>
      /* ══ SPLASH ══════════════════════════════════════════ */
      #splashOverlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        will-change: transform;
      }

      @keyframes splashSlideUp {
        0%   { transform: translateY(0); }
        100% { transform: translateY(-100%); }
      }

      #splashOverlay.slide-out {
        animation: splashSlideUp 0.9s cubic-bezier(0.76, 0, 0.24, 1) forwards;
      }

      #splashBg {
        position: absolute;
        inset: 0;
        background: url('pics/project 2.png') center center / cover no-repeat;
        transform: scale(1.06);
        transition: transform 7s ease;
      }

      #splashOverlay::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, rgba(8,6,4,0.50) 0%, rgba(13,10,6,0.75) 45%, rgba(6,4,2,0.92) 100%);
        z-index: 1;
      }

      .splash-content {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 2rem clamp(1.5rem, 6vw, 5rem);
        max-width: 760px;
        width: 100%;
      }

      .splash-logo-ring {
        width: 92px;
        height: 92px;
        border-radius: 50%;
        border: 2px solid rgba(212,146,42,0.55);
        padding: 4px;
        margin: 0 auto 1.5rem;
        box-shadow: 0 0 0 8px rgba(212,146,42,0.07), 0 0 48px rgba(212,146,42,0.18);
        animation: logoRingPulse 3s ease-in-out infinite;
      }

      @keyframes logoRingPulse {
        0%, 100% { box-shadow: 0 0 0 8px rgba(212,146,42,0.07), 0 0 48px rgba(212,146,42,0.18); }
        50%       { box-shadow: 0 0 0 14px rgba(212,146,42,0.04), 0 0 70px rgba(212,146,42,0.26); }
      }

      .splash-logo-ring img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
      }

      .splash-rule {
        width: 60px;
        height: 2px;
        background: linear-gradient(90deg, transparent, #d4922a, transparent);
        margin: 0 auto 1.25rem;
        opacity: 0;
        animation: ruleReveal 0.7s ease 0.3s forwards;
      }

      @keyframes ruleReveal { to { opacity: 1; } }

      .splash-title {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: clamp(1.35rem, 3.8vw, 2.4rem);
        font-weight: 700;
        color: #ede0c4;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        line-height: 1.3;
        margin-bottom: 0.375rem;
        min-height: 2.8em;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
      }

      .tw-cursor {
        display: inline-block;
        width: 2.5px;
        height: 1em;
        background: #d4922a;
        margin-left: 3px;
        vertical-align: middle;
        flex-shrink: 0;
        animation: cursorBlink 0.7s step-end infinite;
      }

      @keyframes cursorBlink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      .splash-tagline {
        font-family: 'DM Sans', sans-serif;
        font-size: clamp(0.7rem, 1.4vw, 0.85rem);
        letter-spacing: 0.28em;
        color: #d4922a;
        text-transform: uppercase;
        opacity: 0;
        transform: translateY(8px);
        margin-bottom: 2.5rem;
        transition: opacity 0.7s ease, transform 0.7s ease;
      }

      .splash-quotes {
        display: flex;
        gap: 1.25rem;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 2.5rem;
        opacity: 0;
        transform: translateY(16px);
        transition: opacity 0.7s ease, transform 0.7s ease;
      }

      .splash-quote-card {
        background: rgba(212,146,42,0.06);
        border: 1px solid rgba(212,146,42,0.2);
        border-radius: 14px;
        padding: 1rem 1.5rem;
        max-width: 320px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        transition: border-color 0.3s ease, background 0.3s ease;
      }

      .splash-quote-card:hover {
        background: rgba(212,146,42,0.10);
        border-color: rgba(212,146,42,0.35);
      }

      .splash-quote-card i {
        color: #d4922a;
        font-size: 1.125rem;
        margin-bottom: 0.4rem;
        display: block;
        opacity: 0.8;
      }

      .splash-quote-card p {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: clamp(1rem, 2vw, 1.2rem);
        font-style: italic;
        color: #f7f0e6;
        margin: 0;
        line-height: 1.55;
      }

      .splash-enter-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.75rem 2.5rem;
        background: transparent;
        border: 1px solid rgba(212,146,42,0.5);
        border-radius: 50px;
        color: #d4922a;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        cursor: pointer;
        opacity: 0;
        transform: translateY(12px);
        transition: opacity 0.7s ease, transform 0.7s ease, background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      }

      .splash-enter-btn:hover {
        background: rgba(212,146,42,0.12);
        border-color: rgba(212,146,42,0.8);
        box-shadow: 0 0 28px rgba(212,146,42,0.22);
      }

      .splash-enter-btn .btn-arrow {
        transition: transform 0.3s ease;
        font-size: 1.1rem;
      }
      .splash-enter-btn:hover .btn-arrow {
        transform: translateX(5px);
      }

      /* Reveal utility */
      .reveal-in {
        opacity: 1 !important;
        transform: translateY(0) !important;
      }

      /* ══ FLIP PAGE TRANSITION ══════════════════════════ */
      @keyframes flipInFromRight {
        0%   { opacity: 0; transform: perspective(1200px) rotateY(25deg) translateX(40px); }
        100% { opacity: 1; transform: perspective(1200px) rotateY(0deg) translateX(0); }
      }
      @keyframes flipOutToRight {
        0%   { opacity: 1; transform: perspective(1200px) rotateY(0deg)   translateX(0); }
        100% { opacity: 0; transform: perspective(1200px) rotateY(-25deg) translateX(-40px); }
      }
      .flip-enter {
        animation: flipInFromRight 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
      }
      .flip-exit {
        animation: flipOutToRight 0.4s cubic-bezier(0.55, 0, 1, 0.45) both;
        pointer-events: none;
      }
    </style>
  </head>
  <body>

    <!-- ══ SPLASH OVERLAY ════════════════════════════════ -->
    <div id="splashOverlay">
      <div id="splashBg"></div>

      <div class="splash-content">
        <!-- Logo ring -->
        <div class="splash-logo-ring">
          <img src="assets/images/cbsh-logo.jpg" alt="CBSH Logo"
               onerror="this.parentElement.style.background='rgba(212,146,42,0.1)';this.style.display='none';" />
        </div>

        <!-- Amber divider -->
        <div class="splash-rule"></div>

        <!-- College name typewriter -->
        <h1 class="splash-title">
          <span id="twText"></span><span class="tw-cursor" id="twCursor"></span>
        </h1>

        <!-- Tagline -->
        <p class="splash-tagline" id="splashTagline">Digital Library &nbsp;•&nbsp; Academic Excellence</p>

        <!-- Single quote -->
        <div class="splash-quotes" id="splashQuotes">
          <div class="splash-quote-card">
            <i class="bi bi-quote"></i>
            <p>Empowering minds through learning</p>
          </div>
        </div>

        <!-- Enter Portal — ONLY trigger -->
        <button class="splash-enter-btn" id="splashEnterBtn" onclick="enterPortal()">
          Enter Portal <i class="bi bi-arrow-right-short btn-arrow"></i>
        </button>
      </div>
    </div>

    <!-- ══ LOGIN PAGE (behind splash) ═══════════════════ -->
    <div class="auth-page">
      <div class="auth-card animate-fade-in-up">
        <div class="auth-logo">
          <img src="assets/images/cbsh-logo.jpg" alt="CBSH Logo" />
          <h1>CBSH Digital Library</h1>
          <p>College of Basic Science &amp; Humanities</p>
        </div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="loginEmail" class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" id="loginEmail" placeholder="you@cbsh.edu" required autocomplete="email" />
            </div>
          </div>

          <div class="mb-3">
            <label for="loginPassword" class="form-label">Password</label>
            <div class="input-group password-toggle">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password" />
              <button type="button" class="toggle-btn" id="togglePassword" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);z-index:5;">
                <i class="bi bi-eye" id="eyeIcon"></i>
              </button>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe" />
              <label class="form-check-label" for="rememberMe">Remember me</label>
            </div>
            <a href="forgot-password.html" class="text-decoration-none" style="font-size:0.8125rem">Forgot Password?</a>
          </div>

          <button type="submit" class="btn btn-primary w-100 btn-lg" id="loginBtn">
            <span id="loginBtnText">Sign In</span>
            <span id="loginSpinner" class="cbsh-spinner ms-2" style="display:none"></span>
          </button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="register.html">Register here</a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/config.js"></script>
    <script src="js/insforge.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>

    <script>
      // Redirect if already logged in
      (function () {
        if (AuthGuard.isLoggedIn()) {
          const role = AuthGuard.getRole();
          const map = { admin: 'admin/dashboard.html', teacher: 'teacher/dashboard.html', student: 'student/dashboard.html' };
          window.location.href = map[role] || 'index.html';
        }
      })();

      // ══ SPLASH — skip if ?skip=1 param present ════════
      (function () {
        const params   = new URLSearchParams(window.location.search);
        const skipSplash = params.get('skip') === '1';
        const flipIn     = params.get('flip') === '1';
        const overlay    = document.getElementById('splashOverlay');
        const authCard   = document.querySelector('.auth-card');

        if (skipSplash) {
          // Remove splash immediately — go straight to login
          overlay.remove();
          if (flipIn && authCard) authCard.classList.add('flip-enter');
          // Clean URL
          history.replaceState({}, '', 'index.html');
          return;
        }

        // Normal splash flow
        const COLLEGE_NAME = 'College of Basic Sciences & Humanities, OUAT';
        const TYPE_DELAY   = 350;
        const TYPE_SPEED   = 42;

        const twText   = document.getElementById('twText');
        const twCursor = document.getElementById('twCursor');
        const tagline  = document.getElementById('splashTagline');
        const quotes   = document.getElementById('splashQuotes');
        const enterBtn = document.getElementById('splashEnterBtn');
        const splashBg = document.getElementById('splashBg');
        let dismissed  = false;

        requestAnimationFrame(() => { splashBg.style.transform = 'scale(1)'; });

        function typeWriter(text, el, speed, done) {
          let i = 0;
          (function tick() {
            if (i < text.length) {
              el.textContent += text[i++];
              setTimeout(tick, speed + (Math.random() * 20 - 10));
            } else if (done) {
              done();
            }
          })();
        }

        setTimeout(() => {
          typeWriter(COLLEGE_NAME, twText, TYPE_SPEED, () => {
            setTimeout(() => {
              twCursor.style.animation = 'none';
              twCursor.style.opacity = '0';
              twCursor.style.transition = 'opacity 0.4s ease';
            }, 700);
            setTimeout(() => tagline.classList.add('reveal-in'), 200);
            setTimeout(() => quotes.classList.add('reveal-in'), 650);
            setTimeout(() => enterBtn.classList.add('reveal-in'), 1050);
          });
        }, TYPE_DELAY);

        window.enterPortal = function () {
          if (dismissed) return;
          dismissed = true;
          overlay.classList.add('slide-out');
          overlay.addEventListener('animationend', () => overlay.remove(), { once: true });
        };
      })();

      // ══ FLIP — intercept Register link ════════════════
      document.addEventListener('DOMContentLoaded', () => {
        const regLink = document.querySelector('.auth-footer a[href="register.html"]');
        if (regLink) {
          regLink.addEventListener('click', (e) => {
            e.preventDefault();
            const card = document.querySelector('.auth-card');
            card.classList.add('flip-exit');
            card.addEventListener('animationend', () => {
              window.location.href = 'register.html?flip=1';
            }, { once: true });
          });
        }
      });

      // Toggle password visibility
      document.getElementById('togglePassword').addEventListener('click', () => {
        const pw = document.getElementById('loginPassword');
        const ic = document.getElementById('eyeIcon');
        if (pw.type === 'password') { pw.type = 'text'; ic.className = 'bi bi-eye-slash'; }
        else { pw.type = 'password'; ic.className = 'bi bi-eye'; }
      });

      // Login form
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { App.showError('Please enter both email and password.'); return; }

        const btn     = document.getElementById('loginBtn');
        const btnText = document.getElementById('loginBtnText');
        const spinner = document.getElementById('loginSpinner');
        btn.disabled = true;
        btnText.textContent = 'Signing in...';
        spinner.style.display = 'inline-block';

        try {
          const result = await AuthGuard.login(email, password);
          if (result.success) {
            if (document.getElementById('rememberMe').checked) {
              localStorage.setItem('cbsh_remembered_email', email);
            } else {
              localStorage.removeItem('cbsh_remembered_email');
            }
            App.showSuccess('Login successful! Redirecting...');
            setTimeout(() => { window.location.href = result.redirect; }, 800);
          } else {
            if (result.needsVerification) {
              const go = await App.confirm('Email Not Verified', 'Your email is not verified. Would you like to verify now?', 'Verify Now', 'info');
              if (go) window.location.href = `verify-email.html?email=${encodeURIComponent(email)}`;
            } else {
              App.showError(result.error);
            }
            btn.disabled = false;
            btnText.textContent = 'Sign In';
            spinner.style.display = 'none';
          }
        } catch (err) {
          console.error('Login error:', err);
          App.showError('An unexpected error occurred. Please try again.');
          btn.disabled = false;
          btnText.textContent = 'Sign In';
          spinner.style.display = 'none';
        }
      });

      // Pre-fill remembered email
      (function () {
        const saved = localStorage.getItem('cbsh_remembered_email');
        if (saved) {
          document.getElementById('loginEmail').value = saved;
          document.getElementById('rememberMe').checked = true;
        }
      })();
    </script>
  </body>
</html>
