<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CBSH Digital Library — Login to access study materials, quizzes, and academic resources."
    />
    <title>CBSH Digital Library — Login</title>

    <!-- Favicon -->
    <link rel="icon" href="assets/images/cbsh-logo.jpg" type="image/jpeg" />

    <!-- Theme (MUST be first) -->
    <link rel="stylesheet" href="css/theme.css" />

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />

    <!-- SweetAlert2 -->
    <link
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card animate-fade-in-up">
        <!-- Logo & Title -->
        <div class="auth-logo">
          <img src="assets/images/cbsh-logo.jpg" alt="CBSH Logo" />
          <h1>CBSH Digital Library</h1>
          <p>College of Basic Science & Humanities</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" novalidate>
          <!-- Email -->
          <div class="mb-3">
            <label for="loginEmail" class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"
                ><i class="bi bi-envelope"></i
              ></span>
              <input
                type="email"
                class="form-control"
                id="loginEmail"
                placeholder="you@cbsh.edu"
                required
                autocomplete="email"
              />
            </div>
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label for="loginPassword" class="form-label">Password</label>
            <div class="input-group password-toggle">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                type="password"
                class="form-control"
                id="loginPassword"
                placeholder="Enter your password"
                required
                autocomplete="current-password"
              />
              <button
                type="button"
                class="toggle-btn"
                id="togglePassword"
                style="
                  position: absolute;
                  right: 12px;
                  top: 50%;
                  transform: translateY(-50%);
                  z-index: 5;
                "
              >
                <i class="bi bi-eye" id="eyeIcon"></i>
              </button>
            </div>
          </div>

          <!-- Remember Me & Forgot -->
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe" />
              <label class="form-check-label" for="rememberMe"
                >Remember me</label
              >
            </div>
            <a
              href="forgot-password.html"
              class="text-decoration-none"
              style="font-size: 0.8125rem"
              >Forgot Password?</a
            >
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            class="btn btn-primary w-100 btn-lg"
            id="loginBtn"
          >
            <span id="loginBtnText">Sign In</span>
            <span
              id="loginSpinner"
              class="cbsh-spinner ms-2"
              style="display: none"
            ></span>
          </button>
        </form>

        <!-- Footer Link -->
        <div class="auth-footer">
          Don't have an account? <a href="register.html">Register here</a>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="js/config.js"></script>
    <script src="js/insforge.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>

    <script>
      // ── Redirect if already logged in ──────────────────
      (function () {
        if (AuthGuard.isLoggedIn()) {
          const role = AuthGuard.getRole();
          const redirectMap = {
            admin: "admin/dashboard.html",
            teacher: "teacher/dashboard.html",
            student: "student/dashboard.html",
          };
          window.location.href = redirectMap[role] || "index.html";
        }
      })();

      // ── Toggle Password Visibility ─────────────────────
      document
        .getElementById("togglePassword")
        .addEventListener("click", () => {
          const pwInput = document.getElementById("loginPassword");
          const eyeIcon = document.getElementById("eyeIcon");
          if (pwInput.type === "password") {
            pwInput.type = "text";
            eyeIcon.className = "bi bi-eye-slash";
          } else {
            pwInput.type = "password";
            eyeIcon.className = "bi bi-eye";
          }
        });

      // ── Login Form Submission ──────────────────────────
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const email = document.getElementById("loginEmail").value.trim();
          const password = document.getElementById("loginPassword").value;

          if (!email || !password) {
            App.showError("Please enter both email and password.");
            return;
          }

          // Show loading state
          const btn = document.getElementById("loginBtn");
          const btnText = document.getElementById("loginBtnText");
          const spinner = document.getElementById("loginSpinner");
          btn.disabled = true;
          btnText.textContent = "Signing in...";
          spinner.style.display = "inline-block";

          try {
            const result = await AuthGuard.login(email, password);

            if (result.success) {
              // Remember Me: store email
              if (document.getElementById("rememberMe").checked) {
                localStorage.setItem("cbsh_remembered_email", email);
              } else {
                localStorage.removeItem("cbsh_remembered_email");
              }

              App.showSuccess("Login successful! Redirecting...");
              setTimeout(() => {
                window.location.href = result.redirect;
              }, 800);
            } else {
              // Check if email needs verification
              if (result.needsVerification) {
                const goVerify = await App.confirm(
                  "Email Not Verified",
                  "Your email is not verified. Would you like to verify now?",
                  "Verify Now",
                  "info",
                );
                if (goVerify) {
                  window.location.href = `verify-email.html?email=${encodeURIComponent(email)}`;
                }
              } else {
                App.showError(result.error);
              }
              btn.disabled = false;
              btnText.textContent = "Sign In";
              spinner.style.display = "none";
            }
          } catch (err) {
            console.error("Login error:", err);
            App.showError("An unexpected error occurred. Please try again.");
            btn.disabled = false;
            btnText.textContent = "Sign In";
            spinner.style.display = "none";
          }
        });

      // ── Pre-fill remembered email ──────────────────────
      (function () {
        const saved = localStorage.getItem("cbsh_remembered_email");
        if (saved) {
          document.getElementById("loginEmail").value = saved;
          document.getElementById("rememberMe").checked = true;
        }
      })();
    </script>
  </body>
</html>
