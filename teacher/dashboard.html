<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Teacher — Dashboard</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">

      <!-- Welcome Banner -->
      <div class="card mb-4" style="background:linear-gradient(135deg, rgba(212,146,42,0.08), rgba(42,109,212,0.05)) !important;">
        <div class="card-body">
          <h2 id="welcomeMsg" style="font-size:1.5rem;">Welcome back!</h2>
          <p style="font-size:0.875rem;">Here's an overview of your teaching activity.</p>
        </div>
      </div>

      <!-- Stat Cards -->
      <div class="row g-3 mb-4" id="statCards"></div>

      <!-- Charts Row -->
      <div class="row g-3 mb-4">
        <div class="col-lg-8">
          <div class="card">
            <div class="card-header">Download Trends (Last 30 Days)</div>
            <div class="card-body" style="height:300px;">
              <canvas id="downloadChart"></canvas>
            </div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="card">
            <div class="card-header">Materials by Subject</div>
            <div class="card-body d-flex align-items-center justify-content-center" style="height:300px;">
              <canvas id="subjectChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- Recent Materials -->
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>Recent Materials</span>
          <a href="my-materials.html" class="btn btn-sm btn-secondary">View All</a>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr><th>Title</th><th>Subject</th><th>Type</th><th>Downloads</th><th>Date</th></tr>
              </thead>
              <tbody id="recentMaterials">
                <tr><td colspan="5" class="text-center py-4" style="color:var(--text-disabled);">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    if (!AuthGuard.init('teacher')) throw new Error('Not authorized');
    App.initLayout('Dashboard', 'teacher');

    Chart.defaults.color = '#C4A882';
    Chart.defaults.borderColor = '#2A1C0A';
    Chart.defaults.font.family = "'DM Sans', sans-serif";

    const user = AuthGuard.getUser();
    document.getElementById('welcomeMsg').textContent = `Welcome back, ${user.name}!`;

    (async function loadDashboard() {
      const [matRes, quizRes, attemptsRes, downloadsRes] = await Promise.all([
        Insforge.DB.query('materials', { filters: { uploaded_by: `eq.${user.id}` }, order: 'upload_date.desc' }),
        Insforge.DB.query('quizzes', { filters: { created_by: `eq.${user.id}` } }),
        Insforge.DB.query('quiz_attempts'),
        Insforge.DB.query('downloads')
      ]);

      const materials = matRes.data || [];
      const quizzes = quizRes.data || [];
      const quizIds = quizzes.map(q => q.id);
      const myAttempts = (attemptsRes.data || []).filter(a => quizIds.includes(a.quiz_id));
      const myDownloads = (downloadsRes.data || []).filter(d => materials.some(m => m.id === d.material_id));
      const totalDL = materials.reduce((s, m) => s + (m.download_count || 0), 0);

      const stats = [
        { icon: 'bi-journal-richtext', color: 'amber', value: materials.length, label: 'My Materials' },
        { icon: 'bi-patch-question-fill', color: 'blue', value: quizzes.length, label: 'My Quizzes' },
        { icon: 'bi-download', color: 'green', value: totalDL, label: 'Total Downloads' },
        { icon: 'bi-pencil-square', color: 'amber', value: myAttempts.length, label: 'Quiz Attempts' }
      ];

      document.getElementById('statCards').innerHTML = stats.map((s, i) => `
        <div class="col-6 col-xl-3">
          <div class="stat-card animate-fade-in-up stagger-${i + 1}">
            <div class="stat-icon ${s.color}"><i class="bi ${s.icon}"></i></div>
            <div class="stat-value">${s.value}</div>
            <div class="stat-label">${s.label}</div>
          </div>
        </div>
      `).join('');

      // Download trend chart
      const last30 = [];
      for (let i = 29; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        last30.push(d.toISOString().slice(0, 10));
      }
      const dlByDay = last30.map(d => myDownloads.filter(dl => dl.downloaded_at?.startsWith(d)).length);

      new Chart(document.getElementById('downloadChart'), {
        type: 'line',
        data: {
          labels: last30.map(d => d.slice(5)),
          datasets: [{ label: 'Downloads', data: dlByDay, borderColor: '#D4922A', backgroundColor: 'rgba(212,146,42,0.1)', fill: true, tension: 0.4 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: { x: { ticks: { maxTicksLimit: 10 } }, y: { beginAtZero: true, ticks: { stepSize: 1 } } }
        }
      });

      // Subject doughnut
      const subjectCounts = {};
      materials.forEach(m => { subjectCounts[m.subject] = (subjectCounts[m.subject] || 0) + 1; });
      const colors = ['#D4922A', '#2A6DD4', '#10B981', '#EF4444', '#F59E0B', '#8B5CF6', '#EC4899', '#06B6D4'];

      new Chart(document.getElementById('subjectChart'), {
        type: 'doughnut',
        data: {
          labels: Object.keys(subjectCounts),
          datasets: [{ data: Object.values(subjectCounts), backgroundColor: colors, borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'bottom' } } }
      });

      // Recent materials table
      const recent = materials.slice(0, 5);
      document.getElementById('recentMaterials').innerHTML = recent.length === 0
        ? '<tr><td colspan="5" class="text-center py-4" style="color:var(--text-disabled);">No materials uploaded yet</td></tr>'
        : recent.map(m => `<tr>
            <td>${App.escapeHtml(m.title)}</td>
            <td><span class="badge bg-secondary">${App.escapeHtml(m.subject)}</span></td>
            <td>${m.file_type?.toUpperCase()}</td>
            <td><span class="font-mono">${m.download_count || 0}</span></td>
            <td>${App.formatDate(m.upload_date)}</td>
          </tr>`).join('');
    })();
  </script>
</body>
</html>
