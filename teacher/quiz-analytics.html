<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Teacher — Quiz Analytics</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/datatables.net-bs5@2.2.2/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">

      <!-- Quiz Selector -->
      <div class="card mb-4">
        <div class="card-body">
          <label for="quizSelect" class="form-label">Select Quiz</label>
          <select class="form-select" id="quizSelect" style="max-width:400px;"></select>
        </div>
      </div>

      <!-- Stats Row -->
      <div class="row g-3 mb-4" id="statsRow" style="display:none;"></div>

      <!-- Charts -->
      <div class="row g-3 mb-4" id="chartsRow" style="display:none;">
        <div class="col-lg-8">
          <div class="card">
            <div class="card-header">Score Distribution</div>
            <div class="card-body" style="height:300px;">
              <canvas id="scoreChart"></canvas>
            </div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="card">
            <div class="card-header">Pass / Fail</div>
            <div class="card-body d-flex align-items-center justify-content-center" style="height:300px;">
              <canvas id="passFailChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- Student Results Table -->
      <div class="card" id="resultsCard" style="display:none;">
        <div class="card-header">Student Results</div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover" id="resultsTable" style="width:100%;">
              <thead>
                <tr><th>Student</th><th>Score</th><th>Percentage</th><th>Result</th><th>Time Taken</th><th>Date</th></tr>
              </thead>
              <tbody id="resultsBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net@2.2.2/js/dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/datatables.net-bs5@2.2.2/js/dataTables.bootstrap5.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    if (!AuthGuard.init('teacher')) throw new Error('Not authorized');
    App.initLayout('Quiz Analytics', 'teacher');

    Chart.defaults.color = '#C4A882';
    Chart.defaults.borderColor = '#2A1C0A';
    Chart.defaults.font.family = "'DM Sans', sans-serif";

    const user = AuthGuard.getUser();
    let allQuizzes = [], studentsMap = {}, scoreChartInst, pfChartInst, dt;

    (async function load() {
      const [qRes, uRes] = await Promise.all([
        Insforge.DB.query('quizzes', { filters: { created_by: `eq.${user.id}` }, order: 'created_at.desc' }),
        Insforge.DB.query('users', { filters: { role: 'eq.student' }, select: 'id,name' })
      ]);
      allQuizzes = qRes.data || [];
      (uRes.data || []).forEach(u => studentsMap[u.id] = u.name);

      const select = document.getElementById('quizSelect');
      select.innerHTML = '<option value="">Choose a quiz...</option>' +
        allQuizzes.map(q => `<option value="${q.id}">${App.escapeHtml(q.title)} (${q.subject})</option>`).join('');

      // Pre-select from URL
      const urlId = new URLSearchParams(window.location.search).get('id');
      if (urlId) { select.value = urlId; loadAnalytics(urlId); }

      select.addEventListener('change', (e) => { if (e.target.value) loadAnalytics(e.target.value); });
    })();

    async function loadAnalytics(quizId) {
      const res = await Insforge.DB.query('quiz_attempts', { filters: { quiz_id: `eq.${quizId}` }, order: 'attempt_date.desc' });
      const attempts = res.data || [];
      const quiz = allQuizzes.find(q => q.id === quizId);

      if (attempts.length === 0) {
        document.getElementById('statsRow').style.display = 'none';
        document.getElementById('chartsRow').style.display = 'none';
        document.getElementById('resultsCard').style.display = 'none';
        App.showError('No attempts for this quiz yet.');
        return;
      }

      const passed = attempts.filter(a => a.status === 'pass').length;
      const failed = attempts.length - passed;
      const avg = (attempts.reduce((s, a) => s + a.percentage, 0) / attempts.length).toFixed(1);
      const highest = Math.max(...attempts.map(a => a.percentage));
      const lowest = Math.min(...attempts.map(a => a.percentage));

      // Stats
      document.getElementById('statsRow').style.display = '';
      document.getElementById('statsRow').innerHTML = [
        { icon: 'bi-people-fill', color: 'amber', value: attempts.length, label: 'Total Attempts' },
        { icon: 'bi-graph-up', color: 'blue', value: avg + '%', label: 'Average Score' },
        { icon: 'bi-trophy', color: 'green', value: highest + '%', label: 'Highest Score' },
        { icon: 'bi-arrow-down-circle', color: 'red', value: lowest + '%', label: 'Lowest Score' }
      ].map((s, i) => `
        <div class="col-6 col-xl-3">
          <div class="stat-card animate-fade-in-up stagger-${i + 1}">
            <div class="stat-icon ${s.color}"><i class="bi ${s.icon}"></i></div>
            <div class="stat-value">${s.value}</div>
            <div class="stat-label">${s.label}</div>
          </div>
        </div>
      `).join('');

      // Charts
      document.getElementById('chartsRow').style.display = '';

      // Score distribution
      const ranges = ['0-20%', '21-40%', '41-60%', '61-80%', '81-100%'];
      const bins = [0, 0, 0, 0, 0];
      attempts.forEach(a => {
        const p = a.percentage;
        if (p <= 20) bins[0]++;
        else if (p <= 40) bins[1]++;
        else if (p <= 60) bins[2]++;
        else if (p <= 80) bins[3]++;
        else bins[4]++;
      });

      if (scoreChartInst) scoreChartInst.destroy();
      scoreChartInst = new Chart(document.getElementById('scoreChart'), {
        type: 'bar',
        data: { labels: ranges, datasets: [{ label: 'Students', data: bins, backgroundColor: ['#EF4444', '#F59E0B', '#F59E0B', '#2A6DD4', '#10B981'], borderRadius: 6 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
      });

      if (pfChartInst) pfChartInst.destroy();
      pfChartInst = new Chart(document.getElementById('passFailChart'), {
        type: 'doughnut',
        data: { labels: ['Passed', 'Failed'], datasets: [{ data: [passed, failed], backgroundColor: ['#10B981', '#EF4444'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
      });

      // Results table
      document.getElementById('resultsCard').style.display = '';
      if (dt) dt.destroy();
      document.getElementById('resultsBody').innerHTML = attempts.map(a => {
        const pColor = a.percentage >= 70 ? 'var(--success)' : a.percentage >= 50 ? 'var(--warning)' : 'var(--danger)';
        const time = a.time_taken ? `${Math.floor(a.time_taken / 60)}m ${a.time_taken % 60}s` : '—';
        return `<tr>
          <td>${App.escapeHtml(studentsMap[a.student_id] || 'Unknown')}</td>
          <td><span class="font-mono">${a.score}/${a.total_questions}</span></td>
          <td><span class="font-mono" style="color:${pColor}">${a.percentage}%</span></td>
          <td>${a.status === 'pass' ? '<span class="badge bg-success">Passed</span>' : '<span class="badge bg-danger">Failed</span>'}</td>
          <td>${time}</td>
          <td>${App.formatDate(a.attempt_date)}</td>
        </tr>`;
      }).join('');

      dt = $('#resultsTable').DataTable({ pageLength: 15, order: [[5, 'desc']], language: { emptyTable: 'No attempts' } });
    }
  </script>
</body>
</html>
