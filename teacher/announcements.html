<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Teacher — Announcements</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">

      <!-- Create -->
      <div class="card mb-4">
        <div class="card-header"><i class="bi bi-megaphone-fill me-2"></i>Create Announcement</div>
        <div class="card-body">
          <form id="announceForm">
            <div class="row g-3">
              <div class="col-md-8">
                <label for="annTitle" class="form-label">Title</label>
                <input type="text" class="form-control" id="annTitle" placeholder="Announcement title" required>
              </div>
              <div class="col-md-4">
                <label for="annPriority" class="form-label">Priority</label>
                <select class="form-select" id="annPriority">
                  <option value="normal">Normal</option>
                  <option value="important">Important</option>
                  <option value="urgent">Urgent</option>
                </select>
              </div>
              <div class="col-12">
                <label for="annContent" class="form-label">Content</label>
                <textarea class="form-control" id="annContent" rows="3" placeholder="Write your announcement..." required></textarea>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary"><i class="bi bi-send me-1"></i>Publish to Students</button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- List -->
      <div class="card">
        <div class="card-header">My Announcements</div>
        <div class="card-body p-0" id="annList"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    if (!AuthGuard.init('teacher')) throw new Error('Not authorized');
    App.initLayout('Announcements', 'teacher');
    const user = AuthGuard.getUser();

    async function loadAnnouncements() {
      const res = await Insforge.DB.query('announcements', { filters: { created_by: `eq.${user.id}` }, order: 'created_at.desc' });
      const items = res.data || [];
      const now = Date.now();
      const active = items.filter(a => !a.expiry_date || new Date(a.expiry_date).getTime() > now);
      const list = document.getElementById('annList');

      if (active.length === 0) {
        list.innerHTML = '<div class="empty-state"><i class="bi bi-megaphone"></i><h5>No announcements</h5><p>Create your first announcement above.</p></div>';
        return;
      }

      const priorityBadge = { normal: 'bg-secondary', important: 'bg-warning', urgent: 'bg-danger' };
      list.innerHTML = active.map(a => `
        <div class="d-flex justify-content-between align-items-start p-3 border-bottom" style="border-color:var(--border-divider)!important;">
          <div>
            <div class="d-flex align-items-center gap-2 mb-1">
              <h5 style="font-size:1rem;margin:0;">${App.escapeHtml(a.title)}</h5>
              <span class="badge ${priorityBadge[a.priority]}">${a.priority}</span>
            </div>
            <p style="font-size:0.875rem;margin:0.25rem 0;">${App.escapeHtml(a.content)}</p>
            <span style="font-size:0.75rem;color:var(--text-disabled);">${App.formatDate(a.created_at)}</span>
          </div>
          <button class="btn btn-sm btn-danger" onclick="deleteAnn('${a.id}')"><i class="bi bi-trash"></i></button>
        </div>
      `).join('');
    }

    document.getElementById('announceForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('annTitle').value.trim();
      const content = document.getElementById('annContent').value.trim();
      const priority = document.getElementById('annPriority').value;
      if (!title || !content) { App.showError('Title and content required.'); return; }

      await Insforge.DB.insert('announcements', { title, content, target_role: 'students', priority, created_by: user.id });
      App.showSuccess('Announcement published!');
      document.getElementById('announceForm').reset();
      loadAnnouncements();
    });

    async function deleteAnn(id) {
      const confirmed = await App.confirm('Delete', 'Remove this announcement?', 'Delete');
      if (!confirmed) return;
      await Insforge.DB.delete('announcements', { id: `eq.${id}` });
      App.showSuccess('Deleted.');
      loadAnnouncements();
    }

    loadAnnouncements();
  </script>
</body>
</html>
