<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Teacher — Upload Material</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <style>
    .drop-zone {
      border: 2px dashed var(--border-input);
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: var(--bg-input);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent-amber);
      background: var(--accent-amber-subtle);
    }
    .drop-zone i { font-size: 3rem; color: var(--text-disabled); margin-bottom: 1rem; display: block; }
    .drop-zone.drag-over i { color: var(--accent-amber); }
    .file-preview { display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 10px; margin-top: 1rem; }
    .file-preview i { font-size: 2rem; }

    /* Progress bar styling */
    #uploadProgress {
      height: 8px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg-input);
    }
    #uploadProgress .progress-bar {
      background: linear-gradient(90deg, var(--accent-amber), #f59e0b);
      transition: width 0.3s ease;
      height: 100%;
    }
    .upload-status {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
      display: none;
    }
    .upload-success-banner {
      background: linear-gradient(135deg, rgba(34,197,94,0.1) 0%, rgba(34,197,94,0.05) 100%);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 12px;
      padding: 1.25rem;
      display: none;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      animation: fadeIn 0.4s ease;
    }
    .upload-success-banner i { font-size: 2rem; color: #22c55e; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">
      <div class="card">
        <div class="card-header"><i class="bi bi-cloud-arrow-up-fill me-2"></i>Upload Study Material</div>
        <div class="card-body">

          <!-- Success Banner (appears after upload) -->
          <div id="successBanner" class="upload-success-banner">
            <i class="bi bi-check-circle-fill"></i>
            <div>
              <strong id="successTitle">Material Uploaded!</strong>
              <p style="margin:0;font-size:0.8125rem;color:var(--text-secondary);" id="successMsg"></p>
            </div>
          </div>

          <form id="uploadForm" novalidate>
            <div class="row g-3">
              <div class="col-md-8">
                <label for="matTitle" class="form-label">Title</label>
                <input type="text" class="form-control" id="matTitle" placeholder="e.g., Linear Algebra Notes — Chapter 3" required>
              </div>
              <div class="col-md-4">
                <label for="matSubject" class="form-label">Subject</label>
                <select class="form-select" id="matSubject" required></select>
              </div>
              <div class="col-md-8">
                <label for="matDescription" class="form-label">Description <span class="text-muted" style="font-size:0.75rem;">(optional)</span></label>
                <textarea class="form-control" id="matDescription" rows="2" placeholder="Brief description of this material"></textarea>
              </div>
              <div class="col-md-4">
                <label for="matSemester" class="form-label">Semester</label>
                <select class="form-select" id="matSemester"></select>
                <label for="matTags" class="form-label mt-3">Tags <span class="text-muted" style="font-size:0.75rem;">(comma separated)</span></label>
                <input type="text" class="form-control" id="matTags" placeholder="notes, chapter-3, exam-prep">
              </div>
              <div class="col-12">
                <label class="form-label">File (PDF or Image)</label>
                <div class="drop-zone" id="dropZone">
                  <i class="bi bi-cloud-arrow-up"></i>
                  <p style="color:var(--text-secondary);margin:0;">Drag & drop your file here, or <span style="color:var(--accent-amber);font-weight:600;">click to browse</span></p>
                  <p style="font-size:0.75rem;color:var(--text-disabled);margin-top:0.5rem;">PDF, JPG, PNG • Max 25MB</p>
                </div>
                <input type="file" id="matFile" accept=".pdf,.jpg,.jpeg,.png" style="display:none;">
                <div id="filePreview" style="display:none;"></div>
              </div>
              <div class="col-12">
                <div class="progress" id="uploadProgress" style="display:none;">
                  <div class="progress-bar" id="uploadBar" style="width:0%;"></div>
                </div>
                <div class="upload-status" id="uploadStatus"></div>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary btn-lg" id="uploadBtn">
                  <span id="uploadBtnText"><i class="bi bi-upload me-1"></i>Upload Material</span>
                  <span id="uploadSpinner" class="cbsh-spinner ms-2" style="display:none;"></span>
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    if (!AuthGuard.init('teacher')) throw new Error('Not authorized');
    App.initLayout('Upload Material', 'teacher');
    App.populateSubjects('matSubject');
    App.populateSemesters('matSemester');

    const user = AuthGuard.getUser();
    let selectedFile = null;
    let progressInterval = null;

    // ── Drag & Drop ──
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('matFile');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); });

    function handleFile(file) {
      const allowed = ['application/pdf', 'image/jpeg', 'image/png'];
      if (!allowed.includes(file.type)) { App.showError('Only PDF, JPG, and PNG files are allowed.'); return; }
      if (file.size > 25 * 1024 * 1024) { App.showError('File must be under 25MB.'); return; }

      selectedFile = file;
      const icon = file.type === 'application/pdf' ? 'bi-file-earmark-pdf text-danger' : 'bi-file-earmark-image text-amber';
      document.getElementById('filePreview').style.display = 'block';
      document.getElementById('filePreview').innerHTML = `
        <div class="file-preview">
          <i class="bi ${icon}"></i>
          <div class="flex-grow-1">
            <strong>${App.escapeHtml(file.name)}</strong>
            <br><span style="font-size:0.75rem;color:var(--text-disabled);">${App.formatFileSize(file.size)}</span>
          </div>
          <button type="button" class="btn btn-sm btn-danger" onclick="removeFile()"><i class="bi bi-x-lg"></i></button>
        </div>`;
      dropZone.style.display = 'none';
      // Hide success banner when selecting a new file
      document.getElementById('successBanner').style.display = 'none';
    }

    function removeFile() {
      selectedFile = null;
      fileInput.value = '';
      document.getElementById('filePreview').style.display = 'none';
      dropZone.style.display = 'block';
    }

    // ── Animated Progress Bar ──
    function startProgress(statusText) {
      const barEl = document.getElementById('uploadBar');
      const statusEl = document.getElementById('uploadStatus');
      document.getElementById('uploadProgress').style.display = 'flex';
      statusEl.style.display = 'block';
      statusEl.textContent = statusText || 'Uploading file...';
      let current = 5;
      barEl.style.width = current + '%';

      // Animate smoothly to ~85% over time
      progressInterval = setInterval(() => {
        if (current < 85) {
          // Slow down as we approach 85
          const increment = Math.max(0.3, (85 - current) * 0.04);
          current += increment;
          barEl.style.width = current + '%';
        }
      }, 100);
    }

    function setProgress(pct, statusText) {
      if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
      const barEl = document.getElementById('uploadBar');
      const statusEl = document.getElementById('uploadStatus');
      barEl.style.width = pct + '%';
      if (statusText) statusEl.textContent = statusText;
    }

    function hideProgress() {
      if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
      document.getElementById('uploadProgress').style.display = 'none';
      document.getElementById('uploadStatus').style.display = 'none';
      document.getElementById('uploadBar').style.width = '0%';
    }

    // ── Upload Handler ──
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const title = document.getElementById('matTitle').value.trim();
      const subject = document.getElementById('matSubject').value;
      const semester = document.getElementById('matSemester').value;
      const description = document.getElementById('matDescription').value.trim();
      const tags = document.getElementById('matTags').value.trim();

      if (!title || !subject) { App.showError('Title and subject are required.'); return; }
      if (!selectedFile) { App.showError('Please select a file to upload.'); return; }

      // Disable form
      const btn = document.getElementById('uploadBtn');
      btn.disabled = true;
      document.getElementById('uploadBtnText').innerHTML = '<i class="bi bi-hourglass-split me-1"></i>Uploading...';
      document.getElementById('uploadSpinner').style.display = 'inline-block';
      document.getElementById('successBanner').style.display = 'none';

      // Start animated progress
      startProgress('Uploading file to storage...');

      try {
        // ── Step 1: Upload file to InsForge Storage ──
        const folder = `materials/${subject.toLowerCase().replace(/\s+/g, '-')}`;
        console.log('[Upload] Starting upload:', selectedFile.name, '→', folder);

        const uploadRes = await Insforge.Storage.upload(selectedFile, folder);

        console.log('[Upload] Storage result:', JSON.stringify(uploadRes));

        if (uploadRes.error) {
          throw new Error(uploadRes.error.message || 'File upload failed.');
        }
        if (!uploadRes.data?.key) {
          throw new Error('No file key returned from storage.');
        }

        setProgress(88, 'Saving to database...');
        const fileKey = uploadRes.data.key;
        const fileUrl = Insforge.Storage.objectUrl(fileKey);
        const fileType = selectedFile.type === 'application/pdf' ? 'pdf' : 'image';

        // ── Step 2: Save material record in database ──
        console.log('[Upload] Saving to DB — key:', fileKey);
        const matRes = await Insforge.DB.insert('materials', {
          title,
          description: description || null,
          subject,
          semester: semester ? parseInt(semester) : null,
          tags: tags || null,
          insforge_file_key: fileKey,
          insforge_url: fileUrl,
          file_type: fileType,
          file_size: selectedFile.size,
          mime_type: selectedFile.type,
          uploaded_by: user.id
        });

        console.log('[Upload] DB result:', JSON.stringify(matRes));

        if (matRes.error) {
          throw new Error(matRes.error.message || 'Failed to save material.');
        }

        setProgress(100, 'Complete!');
        AuthGuard.logActivity('UPLOAD_MATERIAL', `Uploaded: ${title} (${subject})`);

        // ── Show inline success banner (no popup) ──
        setTimeout(() => {
          hideProgress();

          // Show success banner
          const banner = document.getElementById('successBanner');
          document.getElementById('successMsg').textContent = `"${title}" is now available in the library.`;
          banner.style.display = 'flex';

          // Reset form
          document.getElementById('uploadForm').reset();
          removeFile();
          App.populateSubjects('matSubject');
          App.populateSemesters('matSemester');
        }, 500);

      } catch (err) {
        console.error('[Upload] ERROR:', err);
        hideProgress();
        App.showError(err.message || 'Upload failed. Please try again.');
      } finally {
        btn.disabled = false;
        document.getElementById('uploadBtnText').innerHTML = '<i class="bi bi-upload me-1"></i>Upload Material';
        document.getElementById('uploadSpinner').style.display = 'none';
      }
    });
  </script>
</body>
</html>
