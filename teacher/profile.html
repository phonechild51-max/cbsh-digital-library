<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Teacher — My Profile</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">
      <div class="row g-4">
        <!-- Profile Card -->
        <div class="col-lg-4">
          <div class="card text-center">
            <div class="card-body">
              <img id="profileAvatar" src="../assets/images/default-avatar.png" alt="Avatar" class="rounded-circle mb-3" style="width:100px;height:100px;object-fit:cover;border:3px solid var(--border-card);">
              <h3 id="profileName" style="font-size:1.25rem;">—</h3>
              <span class="badge bg-info mb-2">Teacher</span>
              <p id="profileEmail" style="font-size:0.875rem;color:var(--text-secondary);">—</p>
              <p style="font-size:0.75rem;color:var(--text-disabled);">Joined <span id="profileJoined">—</span></p>
              <label for="avatarUpload" class="btn btn-sm btn-secondary mt-2" style="cursor:pointer;">
                <i class="bi bi-camera me-1"></i>Change Photo
              </label>
              <input type="file" id="avatarUpload" accept=".jpg,.jpeg,.png" style="display:none;">
            </div>
          </div>
        </div>

        <!-- Edit Profile -->
        <div class="col-lg-8">
          <div class="card">
            <div class="card-header">Edit Profile</div>
            <div class="card-body">
              <form id="profileForm">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label for="editName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="editName">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="editEmail" disabled>
                  </div>
                  <div class="col-12">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save Changes</button>
                  </div>
                </div>
              </form>
            </div>
          </div>

          <!-- Change Password -->
          <div class="card mt-4">
            <div class="card-header">Change Password</div>
            <div class="card-body">
              <form id="passwordForm">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label for="newPw" class="form-label">New Password</label>
                    <input type="password" class="form-control" id="newPw" placeholder="New password" required>
                  </div>
                  <div class="col-md-6">
                    <label for="confirmPw" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPw" placeholder="Confirm password" required>
                  </div>
                  <div class="col-12">
                    <button type="submit" class="btn btn-secondary"><i class="bi bi-lock me-1"></i>Update Password</button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    if (!AuthGuard.init('teacher')) throw new Error('Not authorized');
    App.initLayout('My Profile', 'teacher');

    const user = AuthGuard.getUser();
    document.getElementById('profileName').textContent = user.name;
    document.getElementById('profileEmail').textContent = user.email;
    document.getElementById('profileJoined').textContent = App.formatDate(user.created_at);
    if (user.profile_picture_url) document.getElementById('profileAvatar').src = user.profile_picture_url;
    document.getElementById('editName').value = user.name;
    document.getElementById('editEmail').value = user.email;

    // Avatar upload
    document.getElementById('avatarUpload').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) { App.showError('Image must be under 2MB.'); return; }

      App.showLoading();
      const uploadRes = await Insforge.Storage.upload(file, `profile-pictures/${user.id}`);
      if (uploadRes.error) { App.hideLoading(); App.showError('Upload failed.'); return; }

      const url = Insforge.Storage.objectUrl(uploadRes.data.key);
      await Insforge.DB.update('users', { id: `eq.${user.id}` }, { profile_picture_url: url });

      // Update local session
      const u = AuthGuard.getUser();
      u.profile_picture_url = url;
      localStorage.setItem('cbsh_user', JSON.stringify(u));

      document.getElementById('profileAvatar').src = url;
      App.hideLoading();
      App.showSuccess('Profile picture updated!');
    });

    // Save profile
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('editName').value.trim();
      if (!name) { App.showError('Name is required.'); return; }

      App.showLoading();
      await Insforge.DB.update('users', { id: `eq.${user.id}` }, { name });
      await Insforge.Auth.updateProfile({ name });

      const u = AuthGuard.getUser();
      u.name = name;
      localStorage.setItem('cbsh_user', JSON.stringify(u));

      document.getElementById('profileName').textContent = name;
      App.hideLoading();
      App.showSuccess('Profile updated!');
    });

    // Change password
    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('newPw').value;
      const confirm = document.getElementById('confirmPw').value;
      if (pw.length < 8) { App.showError('Password must be at least 8 characters.'); return; }
      if (pw !== confirm) { App.showError('Passwords do not match.'); return; }

      App.showLoading();
      const res = await Insforge.Auth.updateProfile({ password: pw });
      App.hideLoading();

      if (res.error) { App.showError('Failed to update password.'); return; }
      document.getElementById('passwordForm').reset();
      App.showSuccess('Password updated!');
    });
  </script>
</body>
</html>
