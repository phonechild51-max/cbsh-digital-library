<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Teacher — My Quizzes</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <ul class="nav nav-tabs" id="quizTabs">
            <li class="nav-item"><button class="nav-link active" onclick="filterTab('all', this)">All</button></li>
            <li class="nav-item"><button class="nav-link" onclick="filterTab('published', this)">Published</button></li>
            <li class="nav-item"><button class="nav-link" onclick="filterTab('draft', this)">Drafts</button></li>
            <li class="nav-item"><button class="nav-link" onclick="filterTab('expired', this)">Expired</button></li>
          </ul>
        </div>
        <a href="create-quiz.html" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg me-1"></i>New Quiz</a>
      </div>

      <div class="row g-3" id="quizGrid"></div>
    </div>
  </div>

  <!-- Edit Quiz Modal -->
  <div class="modal fade" id="editQuizModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Quiz</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editQuizId">
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label">Title</label>
              <input type="text" class="form-control" id="editQuizTitle" required>
            </div>
            <div class="col-md-4">
              <label class="form-label">Subject</label>
              <select class="form-select" id="editQuizSubject"></select>
            </div>
            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea class="form-control" id="editQuizDesc" rows="2"></textarea>
            </div>
            <div class="col-md-4">
              <label class="form-label">Duration (min)</label>
              <input type="number" class="form-control" id="editQuizDuration" min="1" max="300">
            </div>
            <div class="col-md-4">
              <label class="form-label">Total Marks</label>
              <input type="number" class="form-control" id="editQuizTotalMarks" min="1">
            </div>
            <div class="col-md-4">
              <label class="form-label">Passing Marks</label>
              <input type="number" class="form-control" id="editQuizPassMarks" min="0">
            </div>
            <div class="col-md-4">
              <label class="form-label">Max Attempts</label>
              <input type="number" class="form-control" id="editQuizMaxAttempts" min="1">
            </div>
            <div class="col-md-4 d-flex align-items-end">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="editQuizRandomize">
                <label class="form-check-label" for="editQuizRandomize">Randomize Questions</label>
              </div>
            </div>
            <div class="col-md-4 d-flex align-items-end">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="editQuizShowResults">
                <label class="form-check-label" for="editQuizShowResults">Show Results Immediately</label>
              </div>
            </div>
            <div class="col-12 d-flex align-items-end">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="editQuizAllowReview">
                <label class="form-check-label" for="editQuizAllowReview">Allow Answer Review</label>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary" onclick="saveEditedQuiz()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    if (!AuthGuard.init('teacher')) throw new Error('Not authorized');
    App.initLayout('My Quizzes', 'teacher');
    App.populateSubjects('editQuizSubject'); // populate subject dropdown in edit modal

    const user = AuthGuard.getUser();
    let allQuizzes = [], allAttempts = [], currentTab = 'all';

    async function loadQuizzes() {
      const [qRes, aRes] = await Promise.all([
        Insforge.DB.query('quizzes', { filters: { created_by: `eq.${user.id}` }, order: 'created_at.desc' }),
        Insforge.DB.query('quiz_attempts')
      ]);
      allQuizzes = qRes.data || [];
      allAttempts = aRes.data || [];
      render();
    }

    function filterTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll('#quizTabs .nav-link').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      let filtered = currentTab === 'all' ? allQuizzes : allQuizzes.filter(q => q.status === currentTab);
      const grid = document.getElementById('quizGrid');

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="col-12"><div class="empty-state"><i class="bi bi-patch-question"></i><h5>No quizzes found</h5><p>Create your first quiz!</p></div></div>';
        return;
      }

      grid.innerHTML = filtered.map((q, i) => {
        const attempts = allAttempts.filter(a => a.quiz_id === q.id);
        const avgPct = attempts.length > 0 ? (attempts.reduce((s, a) => s + a.percentage, 0) / attempts.length).toFixed(1) : '—';
        const passRate = attempts.length > 0 ? ((attempts.filter(a => a.status === 'pass').length / attempts.length) * 100).toFixed(0) : '—';
        const statusBadge = { draft: 'bg-secondary', published: 'bg-success', expired: 'bg-warning' };

        return `<div class="col-md-6 col-xl-4">
          <div class="quiz-card animate-fade-in-up stagger-${(i % 6) + 1}">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <div class="quiz-title">${App.escapeHtml(q.title)}</div>
              <span class="badge ${statusBadge[q.status]}">${q.status}</span>
            </div>
            <span class="badge bg-secondary mb-2">${App.escapeHtml(q.subject)}</span>
            <div class="quiz-meta">
              <span><i class="bi bi-clock"></i> ${q.duration}min</span>
              <span><i class="bi bi-star"></i> ${q.total_marks} marks</span>
              <span><i class="bi bi-people"></i> ${attempts.length} attempts</span>
            </div>
            <div class="d-flex gap-2 mt-2" style="font-size:0.8125rem;color:var(--text-secondary);">
              <span>Avg: <strong class="font-mono">${avgPct}%</strong></span>
              <span>Pass rate: <strong class="font-mono">${passRate}%</strong></span>
            </div>
            <div class="d-flex gap-2 mt-3">
              ${q.status === 'draft' ? `<button class="btn btn-sm btn-success flex-fill" onclick="publishQuiz('${q.id}')"><i class="bi bi-send me-1"></i>Publish</button>` : ''}
              ${q.status === 'published' ? `<a href="quiz-analytics.html?id=${q.id}" class="btn btn-sm btn-info flex-fill"><i class="bi bi-graph-up me-1"></i>Analytics</a>` : ''}
              <button class="btn btn-sm btn-secondary" onclick="editQuiz('${q.id}')"><i class="bi bi-pencil"></i></button>
              <button class="btn btn-sm btn-danger" onclick="deleteQuiz('${q.id}')"><i class="bi bi-trash"></i></button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    async function publishQuiz(id) {
      const confirmed = await App.confirm('Publish Quiz', 'Students will be able to take this quiz immediately.', 'Publish', 'question');
      if (!confirmed) return;
      await Insforge.DB.update('quizzes', { id: `eq.${id}` }, { status: 'published' });
      App.showSuccess('Quiz published!');
      loadQuizzes();
    }

    async function deleteQuiz(id) {
      const confirmed = await App.confirm('Delete Quiz', 'This will permanently remove the quiz and all attempts.', 'Delete');
      if (!confirmed) return;
      App.showLoading();
      await Insforge.DB.delete('quizzes', { id: `eq.${id}` });
      AuthGuard.logActivity('DELETE_QUIZ', `Deleted quiz ${id}`);
      App.hideLoading();
      App.showSuccess('Quiz deleted.');
      loadQuizzes();
    }

    function editQuiz(id) {
      const q = allQuizzes.find(x => x.id === id);
      if (!q) return;
      document.getElementById('editQuizId').value = q.id;
      document.getElementById('editQuizTitle').value = q.title;
      document.getElementById('editQuizSubject').value = q.subject;
      document.getElementById('editQuizDesc').value = q.description || '';
      document.getElementById('editQuizDuration').value = q.duration;
      document.getElementById('editQuizTotalMarks').value = q.total_marks;
      document.getElementById('editQuizPassMarks').value = q.passing_marks;
      document.getElementById('editQuizMaxAttempts').value = q.max_attempts || 1;
      document.getElementById('editQuizRandomize').checked = !!q.randomize_questions;
      document.getElementById('editQuizShowResults').checked = !!q.show_results_immediately;
      document.getElementById('editQuizAllowReview').checked = !!q.allow_review;
      new bootstrap.Modal(document.getElementById('editQuizModal')).show();
    }

    async function saveEditedQuiz() {
      const id = document.getElementById('editQuizId').value;
      const title = document.getElementById('editQuizTitle').value.trim();
      const subject = document.getElementById('editQuizSubject').value;
      if (!title || !subject) { App.showError('Title and subject are required.'); return; }
      App.showLoading();
      await Insforge.DB.update('quizzes', { id: `eq.${id}` }, {
        title,
        subject,
        description: document.getElementById('editQuizDesc').value.trim() || null,
        duration: parseInt(document.getElementById('editQuizDuration').value) || 30,
        total_marks: parseInt(document.getElementById('editQuizTotalMarks').value) || 0,
        passing_marks: parseInt(document.getElementById('editQuizPassMarks').value) || 0,
        max_attempts: parseInt(document.getElementById('editQuizMaxAttempts').value) || 1,
        randomize_questions: document.getElementById('editQuizRandomize').checked,
        show_results_immediately: document.getElementById('editQuizShowResults').checked,
        allow_review: document.getElementById('editQuizAllowReview').checked
      });
      bootstrap.Modal.getInstance(document.getElementById('editQuizModal')).hide();
      App.hideLoading();
      App.showSuccess('Quiz updated!');
      loadQuizzes();
    }

    loadQuizzes();
  </script>
</body>
</html>
