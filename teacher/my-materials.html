<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSH Teacher — My Materials</title>
  <link rel="icon" href="../assets/images/cbsh-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="cbsh-main">
    <div id="topbarContainer"></div>
    <div class="cbsh-content">

      <!-- Filters -->
      <div class="d-flex flex-wrap gap-2 mb-4 align-items-center">
        <div class="cbsh-search flex-grow-1" style="max-width:300px;">
          <i class="bi bi-search"></i>
          <input type="text" class="form-control" id="searchInput" placeholder="Search materials...">
        </div>
        <select class="form-select" id="filterSubject" style="max-width:180px;"></select>
        <select class="form-select" id="filterSemester" style="max-width:160px;"></select>
        <div class="ms-auto">
          <button class="btn btn-sm btn-secondary" id="gridViewBtn" onclick="setView('grid')"><i class="bi bi-grid-3x3-gap-fill"></i></button>
          <button class="btn btn-sm btn-secondary" id="listViewBtn" onclick="setView('list')"><i class="bi bi-list-task"></i></button>
        </div>
        <a href="upload-material.html" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg me-1"></i>Upload</a>
      </div>

      <!-- Materials Container -->
      <div id="materialsContainer"></div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Material</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId">
          <div class="mb-3">
            <label for="editTitle" class="form-label">Title</label>
            <input type="text" class="form-control" id="editTitle">
          </div>
          <div class="mb-3">
            <label for="editDescription" class="form-label">Description</label>
            <textarea class="form-control" id="editDescription" rows="2"></textarea>
          </div>
          <div class="row g-3">
            <div class="col-6">
              <label for="editSubject" class="form-label">Subject</label>
              <select class="form-select" id="editSubject"></select>
            </div>
            <div class="col-6">
              <label for="editSemester" class="form-label">Semester</label>
              <select class="form-select" id="editSemester"></select>
            </div>
          </div>
          <div class="mb-3 mt-3">
            <label for="editTags" class="form-label">Tags</label>
            <input type="text" class="form-control" id="editTags">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/config.js"></script>
  <script src="../js/insforge.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/theme-toggle.js"></script>
  <script src="../js/notifications.js"></script>

  <script>
    if (!AuthGuard.init('teacher')) throw new Error('Not authorized');
    App.initLayout('My Materials', 'teacher');
    App.populateSubjects('filterSubject', true);
    App.populateSemesters('filterSemester', true);
    App.populateSubjects('editSubject');
    App.populateSemesters('editSemester');

    const user = AuthGuard.getUser();
    let allMaterials = [];
    let viewMode = 'grid';

    async function loadMaterials() {
      const res = await Insforge.DB.query('materials', { filters: { uploaded_by: `eq.${user.id}` }, order: 'upload_date.desc' });
      allMaterials = res.data || [];
      renderMaterials();
    }

    function renderMaterials() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const subject = document.getElementById('filterSubject').value;
      const semester = document.getElementById('filterSemester').value;

      let filtered = [...allMaterials];
      if (search) filtered = filtered.filter(m => m.title.toLowerCase().includes(search) || (m.description || '').toLowerCase().includes(search));
      if (subject) filtered = filtered.filter(m => m.subject === subject);
      if (semester) filtered = filtered.filter(m => String(m.semester) === semester);

      const container = document.getElementById('materialsContainer');
      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="bi bi-journal-x"></i><h5>No materials found</h5><p>Try adjusting your filters or upload new material.</p></div>';
        return;
      }

      if (viewMode === 'grid') {
        container.innerHTML = `<div class="row g-3">${filtered.map((m, i) => {
          const icon = m.file_type === 'pdf' ? 'bi-file-earmark-pdf' : 'bi-file-earmark-image';
          return `<div class="col-sm-6 col-lg-4 col-xl-3">
            <div class="material-card animate-fade-in-up stagger-${(i % 6) + 1}">
              <div class="material-thumb"><i class="bi ${icon}"></i></div>
              <div class="material-info">
                <div class="material-title">${App.escapeHtml(m.title)}</div>
                <span class="badge bg-secondary">${App.escapeHtml(m.subject)}</span>
                <div class="material-meta">
                  <span><i class="bi bi-download"></i> ${m.download_count || 0}</span>
                  <span><i class="bi bi-calendar3"></i> ${App.formatDate(m.upload_date)}</span>
                </div>
              </div>
              <div class="material-actions">
                <button class="btn btn-sm btn-info flex-fill" onclick="editMaterial('${m.id}')"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-danger flex-fill" onclick="deleteMaterial('${m.id}', '${m.insforge_file_key}')"><i class="bi bi-trash"></i></button>
              </div>
            </div>
          </div>`;
        }).join('')}</div>`;
      } else {
        container.innerHTML = `<div class="card"><div class="card-body p-0"><div class="table-responsive"><table class="table table-hover mb-0">
          <thead><tr><th>Title</th><th>Subject</th><th>Sem</th><th>Type</th><th>Downloads</th><th>Date</th><th>Actions</th></tr></thead>
          <tbody>${filtered.map(m => `<tr>
            <td>${App.escapeHtml(m.title)}</td>
            <td><span class="badge bg-secondary">${App.escapeHtml(m.subject)}</span></td>
            <td>${m.semester || '—'}</td>
            <td>${m.file_type?.toUpperCase()}</td>
            <td><span class="font-mono">${m.download_count || 0}</span></td>
            <td>${App.formatDate(m.upload_date)}</td>
            <td>
              <button class="btn btn-sm btn-info" onclick="editMaterial('${m.id}')"><i class="bi bi-pencil"></i></button>
              <button class="btn btn-sm btn-danger" onclick="deleteMaterial('${m.id}', '${m.insforge_file_key}')"><i class="bi bi-trash"></i></button>
            </td>
          </tr>`).join('')}</tbody>
        </table></div></div></div>`;
      }
    }

    function setView(mode) { viewMode = mode; renderMaterials(); }

    document.getElementById('searchInput').addEventListener('input', App.debounce(renderMaterials));
    document.getElementById('filterSubject').addEventListener('change', renderMaterials);
    document.getElementById('filterSemester').addEventListener('change', renderMaterials);

    function editMaterial(id) {
      const m = allMaterials.find(x => x.id === id);
      if (!m) return;
      document.getElementById('editId').value = m.id;
      document.getElementById('editTitle').value = m.title;
      document.getElementById('editDescription').value = m.description || '';
      document.getElementById('editSubject').value = m.subject;
      document.getElementById('editSemester').value = m.semester || '';
      document.getElementById('editTags').value = m.tags || '';
      new bootstrap.Modal(document.getElementById('editModal')).show();
    }

    async function saveEdit() {
      const id = document.getElementById('editId').value;
      const data = {
        title: document.getElementById('editTitle').value.trim(),
        description: document.getElementById('editDescription').value.trim() || null,
        subject: document.getElementById('editSubject').value,
        semester: document.getElementById('editSemester').value ? parseInt(document.getElementById('editSemester').value) : null,
        tags: document.getElementById('editTags').value.trim() || null
      };
      if (!data.title || !data.subject) { App.showError('Title and subject are required.'); return; }

      App.showLoading();
      const res = await Insforge.DB.update('materials', { id: `eq.${id}` }, data);
      App.hideLoading();

      if (res.error) { App.showError('Update failed.'); return; }
      bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
      App.showSuccess('Material updated!');
      loadMaterials();
    }

    async function deleteMaterial(id, fileKey) {
      const confirmed = await App.confirm('Delete Material', 'This will permanently remove this material and its file.', 'Delete');
      if (!confirmed) return;
      App.showLoading();
      await Insforge.Storage.delete(fileKey);
      await Insforge.DB.delete('materials', { id: `eq.${id}` });
      AuthGuard.logActivity('DELETE_MATERIAL', `Deleted material ${id}`);
      App.hideLoading();
      App.showSuccess('Material deleted.');
      loadMaterials();
    }

    loadMaterials();
  </script>
</body>
</html>
